[package]
name = "hermes-hub-backend"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
default-run = "hermes-hub-backend"

[lib]
name = "hermes_hub_backend"
path = "src/lib.rs"

[[bin]]
name = "hermes-hub-backend"
path = "src/main.rs"

[[bin]]
name = "hermes-graph-project"
path = "src/bin/hermes_graph_project.rs"

[dependencies]
aes-gcm = "0.10"
argon2 = "0.5"
async-imap = { version = "0.11.2", default-features = false, features = ["runtime-tokio"] }
async-native-tls = { version = "0.6.0", default-features = false, features = ["runtime-tokio"] }
axum = "0.8"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlx = { version = "0.8", default-features = false, features = ["chrono", "json", "macros", "migrate", "postgres", "runtime-tokio-rustls"] }
tantivy = "0.25.0"
thiserror = "2"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = "2"

[dev-dependencies]
tempfile = "3.27.0"
tower = { version = "0.5", features = ["util"] }
