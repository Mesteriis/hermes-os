[package]
name = "hermes-hub-backend"
publish = false
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
default-run = "hermes-hub-backend"

[lib]
name = "hermes_hub_backend"
path = "src/lib.rs"

[[bin]]
name = "hermes-hub-backend"
path = "src/main.rs"

[[bin]]
name = "hermes-graph-project"
path = "src/bin/hermes_graph_project.rs"

[[bin]]
name = "hermes-email-fixture-export"
path = "src/bin/hermes_email_fixture_export.rs"

[[bin]]
name = "hermes-email-fixture-dev"
path = "src/bin/hermes_email_fixture_dev.rs"

[[bin]]
name = "hermes-email-sync-dev"
path = "src/bin/hermes_email_sync_dev.rs"

[[bin]]
name = "hermes-document-process"
path = "src/bin/hermes_document_process.rs"

[dependencies]
aes-gcm = "0.10"
argon2 = "0.5"
async-imap = { version = "0.11.2", default-features = false, features = ["runtime-tokio"] }
async-native-tls = { version = "0.6.0", default-features = false, features = ["runtime-tokio"] }
axum = "0.8"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
futures = "0.3"
libloading = "0.8"
qrcode = { version = "0.14.1", default-features = false, features = ["svg"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
sqlx = { version = "0.8", default-features = false, features = ["chrono", "json", "macros", "migrate", "postgres", "runtime-tokio-rustls"] }
tantivy = "0.25.0"
thiserror = "2"
tokio = { version = "1", features = ["fs", "macros", "net", "rt-multi-thread"] }
tower-http = { version = "0.6", features = ["cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = "2"

[dev-dependencies]
insta = "1.42"
mockall = "0.13"
tempfile = "3.27.0"
testkit = { path = "../crates/testkit" }
tower = { version = "0.5", features = ["util"] }
