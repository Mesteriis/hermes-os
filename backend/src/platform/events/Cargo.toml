[package]
name = "hermes-events-protocol"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "platform"
owner = "events"
surface = "contract"

[dependencies]
hpke = { version = "=0.14.0", default-features = false, features = ["alloc", "chacha", "getrandom", "x25519"] }
nats-jwt = "=0.3.0"
prost = "=0.14.4"
prost-types = "=0.14.4"
sha2 = { version = "=0.11.0", default-features = false }
zeroize = "=1.9.0"

[build-dependencies]
prost-build = "=0.14.4"
protoc-bin-vendored = "=3.2.0"
