syntax = "proto3";

package hermes.events.v1;

import "google/protobuf/timestamp.proto";

message DurableEnvelopeV1 {
  uint32 envelope_major = 1;
  uint32 envelope_revision = 2;
  bytes message_id = 3;
  ContractRefV1 contract = 4;
  SourceRefV1 source = 5;
  google.protobuf.Timestamp recorded_at = 6;
  bytes partition_key = 7;
  bytes causation_message_id = 8;
  bytes correlation_id = 9;
  ActorRefV1 actor = 10;
  TraceContextV1 trace = 11;
  SourceFenceV1 source_fence = 12;

  oneof semantics {
    CommandMetadataV1 command = 20;
    EventMetadataV1 event = 21;
    ObservationMetadataV1 observation = 22;
    ResultMetadataV1 result = 23;
    AckMetadataV1 ack = 24;
  }

  bytes payload = 30;

  reserved 13 to 19, 25 to 29, 31 to 39;
}

message ContractRefV1 {
  string owner = 1;
  string name = 2;
  uint32 major = 3;
  uint32 revision = 4;
  bytes schema_sha256 = 5;
}

message SourceRefV1 {
  string module_id = 1;
  bytes runtime_instance_id = 2;
  uint64 runtime_generation = 3;
}

enum ActorKindV1 {
  ACTOR_KIND_V1_UNSPECIFIED = 0;
  ACTOR_KIND_V1_SYSTEM = 1;
  ACTOR_KIND_V1_OWNER_DEVICE = 2;
  ACTOR_KIND_V1_MODULE = 3;
}

message ActorRefV1 {
  ActorKindV1 kind = 1;
  bytes actor_id = 2;
}

message TraceContextV1 {
  bytes trace_id = 1;
  bytes parent_span_id = 2;
  uint32 trace_flags = 3;
}

enum FenceKindV1 {
  FENCE_KIND_V1_UNSPECIFIED = 0;
  FENCE_KIND_V1_GRANT_EPOCH = 1;
  FENCE_KIND_V1_RUNTIME_LEASE = 2;
}

message SourceFenceV1 {
  FenceKindV1 kind = 1;
  bytes scope_id = 2;
  uint64 epoch = 3;
}

message CommandMetadataV1 {
  bytes command_id = 1;
  string target_capability = 2;
  bytes idempotency_key = 3;
  google.protobuf.Timestamp deadline = 4;
  uint32 logical_attempt = 5;
}

message EventMetadataV1 {
  google.protobuf.Timestamp occurred_at = 1;
}

message ObservationMetadataV1 {
  bytes observation_id = 1;
  google.protobuf.Timestamp observed_at = 2;
  google.protobuf.Timestamp occurred_at = 3;
  bytes source_cursor_sha256 = 4;
  optional uint64 source_sequence = 5;
}

enum ResultOutcomeV1 {
  RESULT_OUTCOME_V1_UNSPECIFIED = 0;
  RESULT_OUTCOME_V1_SUCCEEDED = 1;
  RESULT_OUTCOME_V1_FAILED = 2;
  RESULT_OUTCOME_V1_CANCELLED = 3;
  RESULT_OUTCOME_V1_EXPIRED = 4;
  RESULT_OUTCOME_V1_REJECTED = 5;
  RESULT_OUTCOME_V1_UNKNOWN_OUTCOME = 6;
}

message ResultMetadataV1 {
  bytes command_id = 1;
  bytes command_message_id = 2;
  ResultOutcomeV1 outcome = 3;
  google.protobuf.Timestamp completed_at = 4;
  uint32 execution_attempt = 5;
}

enum AckStageV1 {
  ACK_STAGE_V1_UNSPECIFIED = 0;
  ACK_STAGE_V1_DURABLE_ACCEPTANCE = 1;
  ACK_STAGE_V1_CANONICAL_PERSISTENCE = 2;
  ACK_STAGE_V1_TERMINAL_HANDLING = 3;
}

enum AckDispositionV1 {
  ACK_DISPOSITION_V1_UNSPECIFIED = 0;
  ACK_DISPOSITION_V1_APPLIED = 1;
  ACK_DISPOSITION_V1_DUPLICATE = 2;
  ACK_DISPOSITION_V1_REJECTED = 3;
}

message AckMetadataV1 {
  bytes acknowledged_message_id = 1;
  AckStageV1 stage = 2;
  AckDispositionV1 disposition = 3;
  google.protobuf.Timestamp acknowledged_at = 4;
}
