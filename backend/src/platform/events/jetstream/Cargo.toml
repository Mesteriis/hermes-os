[package]
name = "hermes-events-jetstream"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "platform"
owner = "events"
surface = "implementation"

[dependencies]
async-nats = "=0.49.1"
base64 = "=0.22.1"
futures-util = "=0.3.32"
hermes-events-protocol = { path = ".." }
hermes-runtime-protocol = { path = "../../runtime_protocol" }
hermes-scheduler-protocol = { path = "../../scheduler/protocol" }
hermes-vault-protocol = { path = "../../vault/protocol" }
getrandom = { version = "=0.4.3", default-features = false }
hpke = { version = "=0.14.0", default-features = false, features = ["alloc", "chacha", "getrandom", "x25519"] }
nats-jwt = "=0.3.0"
serde = { version = "=1.0.228", default-features = false, features = ["derive"] }
serde_json = "=1.0.150"
tokio = { version = "=1.52.4", default-features = false, features = ["rt-multi-thread", "time"] }
zeroize = "=1.9.0"
