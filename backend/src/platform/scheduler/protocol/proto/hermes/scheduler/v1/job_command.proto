syntax = "proto3";

package hermes.scheduler.v1;

message JobKindV1 {
  string owner = 1;
  string name = 2;
  uint32 major = 3;
}

message JobLeaseV1 {
  bytes run_id = 1;
  uint64 epoch = 2;
  int64 expires_at_unix_millis = 3;
}

enum JobTriggerKindV1 {
  JOB_TRIGGER_KIND_V1_UNSPECIFIED = 0;
  JOB_TRIGGER_KIND_V1_TIME = 1;
  JOB_TRIGGER_KIND_V1_RETRY = 2;
}

// Typed DurableEnvelopeV1.command payload for a Scheduler time trigger.
// It never contains owner-specific input, provider state or executable code.
message ScheduledJobCommandV1 {
  bytes job_run_id = 1;
  JobKindV1 job_kind = 2;
  bytes schedule_id = 3;
  uint64 schedule_revision = 4;
  string scope_id = 5;
  JobTriggerKindV1 trigger_kind = 6;
  int64 scheduled_for_unix_millis = 7;
  JobLeaseV1 lease = 8;
}

enum JobRunOutcomeV1 {
  JOB_RUN_OUTCOME_V1_UNSPECIFIED = 0;
  JOB_RUN_OUTCOME_V1_ACCEPTED = 1;
  JOB_RUN_OUTCOME_V1_SUCCEEDED = 2;
  JOB_RUN_OUTCOME_V1_RETRYABLE_FAILED = 3;
  JOB_RUN_OUTCOME_V1_FAILED = 4;
  JOB_RUN_OUTCOME_V1_CANCELLED = 5;
}

// Owner-neutral receipt payload carried by a durable Ack or Result envelope.
// A Scheduler accepts it only when all identifiers and lease fences match the
// persisted dispatch; it carries neither owner state nor error content.
message JobRunReceiptV1 {
  bytes job_run_id = 1;
  bytes command_message_id = 2;
  JobLeaseV1 lease = 3;
  JobRunOutcomeV1 outcome = 4;
  int64 observed_at_unix_millis = 5;
}
