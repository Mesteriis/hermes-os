[package]
name = "hermes-scheduler-jetstream"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "platform"
owner = "scheduler"
surface = "implementation"

[dependencies]
async-nats = "=0.49.1"
futures-util = "=0.3.32"
getrandom = { version = "=0.4.3", default-features = false }
hermes-events-protocol = { path = "../../events" }
hermes-runtime-protocol = { path = "../../runtime_protocol" }
hermes-scheduler-protocol = { path = "../protocol" }
nats-jwt = "=0.3.0"
prost = "=0.14.4"
tokio = { version = "=1.52.4", default-features = false, features = ["time"] }
