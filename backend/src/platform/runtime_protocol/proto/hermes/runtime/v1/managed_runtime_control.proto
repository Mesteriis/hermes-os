syntax = "proto3";

package hermes.runtime.v1;

import "hermes/runtime/v1/vault_runtime.proto";
import "hermes/runtime/v1/module_client.proto";
import "hermes/runtime/v1/blob_runtime.proto";

// One-shot inherited private control channel for a Kernel-managed runtime.
message DescribeManagedRuntimeRequestV1 {
  bytes descriptor_bytes = 1;
  bytes settings_schema_bytes = 2;
}
message DescribeManagedRuntimeResponseV1 {
  string registration_id = 1;
  uint64 runtime_generation = 2;
  uint64 grant_epoch = 3;
}
message ManagedRuntimeReadyRequestV1 {
  string registration_id = 1;
  uint64 runtime_generation = 2;
  uint64 grant_epoch = 3;
}
// Sent by a verified managed module after ready. It deliberately carries no
// owner identity or NATS subjects: Kernel derives those from approved topology.
message ManagedRuntimeEventCredentialRequestV1 {
  bytes request_id = 1;
  uint64 credential_revision = 2;
  uint32 ttl_seconds = 3;
  bytes recipient_public_key_x25519 = 4;
}
// Kernel-derived pull-consumer binding for one already approved subscription.
// A managed runtime receives it only with a credential delivery bound to its
// current registration, runtime generation and grant epoch.
message ManagedRuntimeEventConsumerBindingV1 {
  string stream_name = 1;
  string durable_name = 2;
  string filter_subject = 3;
  uint32 ack_wait_millis = 4;
  uint32 max_deliver = 5;
  uint32 max_ack_pending = 6;
}
message ManagedRuntimeEventCredentialDeliveryV1 {
  bytes encapped_key = 1;
  bytes ciphertext = 2;
  bytes tag = 3;
  repeated ManagedRuntimeEventConsumerBindingV1 consumer_bindings = 4;
  // Exact publish subjects derived by Kernel from the approved topology.
  repeated string publish_subjects = 5;
}
message ManagedRuntimeProviderCredentialRequestV1 {
  bytes request_id = 1;
  string purpose_id = 2;
  uint64 credential_revision = 3;
  uint32 ttl_seconds = 4;
  uint32 secret_class = 5;
  bytes recipient_public_key_x25519 = 6;
  string configuration_instance_id = 7;
  // Exactly one descriptor-declared Vault action; never an implicit write grant.
  uint32 action = 8;
}
message ManagedRuntimeProviderCredentialDeliveryV1 {
  bytes encapped_key = 1;
  bytes ciphertext = 2;
  bytes tag = 3;
}
// Requests an exact descriptor-declared owner-derived key lease. The request
// carries no configuration instance, action, secret class or key material:
// Kernel derives all of those from the exact approved owner capability.
message ManagedRuntimeOwnerDerivedKeyRequestV1 {
  bytes request_id = 1;
  string purpose_id = 2;
  uint32 key_schema_revision = 3;
  uint32 ttl_seconds = 4;
  bytes recipient_public_key_x25519 = 5;
  string capability_id = 6;
}
message ManagedRuntimeOwnerDerivedKeyDeliveryV1 {
  bytes encapped_key = 1;
  bytes ciphertext = 2;
  bytes tag = 3;
}
// Request for exactly one Blob data session. The runtime supplies a fresh
// channel-binding digest; content never crosses this control channel.
message ManagedRuntimeBlobSessionRequestV1 {
  bytes request_id = 1;
  string capability_id = 2;
  uint32 operation = 3;
  bytes channel_binding_sha256 = 4;
  bytes reference_id = 5;
  uint64 declared_size = 6;
  uint32 backup_class = 7;
  uint32 ttl_seconds = 8;
}
message ManagedRuntimeBlobSessionDeliveryV1 {
  string data_socket_path = 1;
  BlobDataSessionGrantV1 grant = 2;
}
message ManagedRuntimeControlRequestV1 {
  oneof operation {
    DescribeManagedRuntimeRequestV1 describe = 1;
    ManagedRuntimeReadyRequestV1 ready = 2;
    ManagedRuntimeEventCredentialRequestV1 issue_event_credential = 3;
    ManagedRuntimeProviderCredentialRequestV1 issue_provider_credential = 4;
    ManagedRuntimeVaultRouteRequestV1 route_vault_ciphertext = 5;
    ManagedRuntimeBlobSessionRequestV1 issue_blob_session = 6;
    ManagedRuntimeOwnerDerivedKeyRequestV1 issue_owner_derived_key = 7;
  }
}
message ManagedRuntimeControlResponseV1 {
  oneof result {
    DescribeManagedRuntimeResponseV1 describe = 1;
    ManagedRuntimeEventCredentialDeliveryV1 event_credential_delivery = 2;
    ManagedRuntimeProviderCredentialDeliveryV1 provider_credential_delivery = 3;
    ManagedRuntimeVaultRouteResponseV1 vault_route = 4;
    ManagedRuntimeBlobSessionDeliveryV1 blob_session_delivery = 5;
    ManagedRuntimeOwnerDerivedKeyDeliveryV1 owner_derived_key_delivery = 6;
  }
  string error_code = 15;
}

// Kernel-to-managed-runtime capability delivery. The Kernel validates the
// target runtime fence and envelope structure, but never decodes the
// owner-owned request payload.
message ManagedRuntimeClientDeliveryRequestV1 {
  ModuleClientRequestV1 request = 1;
}
message ManagedRuntimeClientDeliveryResponseV1 {
  ModuleClientResponseV1 response = 1;
}

// Request initiated by an already verified managed platform process over its
// inherited Kernel control FD. Only the Kernel may authorize and relay it.
message ManagedRuntimeVaultRouteRequestV1 {
  VaultCiphertextRouteV1 route = 1;
}
message ManagedRuntimeVaultRouteResponseV1 {
  VaultCiphertextResponseV1 response = 1;
  string error_code = 15;
}
