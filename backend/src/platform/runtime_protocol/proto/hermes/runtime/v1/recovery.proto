syntax = "proto3";

package hermes.runtime.v1;

enum KernelStateV1 {
  KERNEL_STATE_V1_UNSPECIFIED = 0;
  KERNEL_STATE_V1_COLD_START = 1;
  KERNEL_STATE_V1_BOOTSTRAP = 2;
  KERNEL_STATE_V1_RECOVERY_ONLY = 3;
  KERNEL_STATE_V1_QUIESCING = 4;
  KERNEL_STATE_V1_DRAINING = 5;
  KERNEL_STATE_V1_STOPPED = 6;
  KERNEL_STATE_V1_FATAL = 7;
}

enum ControlStoreStatusV1 {
  CONTROL_STORE_STATUS_V1_UNSPECIFIED = 0;
  CONTROL_STORE_STATUS_V1_TRUSTWORTHY = 1;
  CONTROL_STORE_STATUS_V1_MISSING = 2;
  CONTROL_STORE_STATUS_V1_UNAVAILABLE = 3;
  CONTROL_STORE_STATUS_V1_CORRUPT = 4;
  CONTROL_STORE_STATUS_V1_INCOMPATIBLE = 5;
}

message RecoveryStatusV1 {
  KernelStateV1 state = 1;
  ControlStoreStatusV1 control_store_status = 2;
  uint64 kernel_generation = 3;
  string blocker_code = 4;
}

enum ModuleKindV1 { MODULE_KIND_V1_UNSPECIFIED = 0; MODULE_KIND_V1_DOMAIN = 1; MODULE_KIND_V1_INTEGRATION = 2; MODULE_KIND_V1_WORKFLOW = 3; MODULE_KIND_V1_ENGINE = 4; MODULE_KIND_V1_PLATFORM = 5; }
enum CapabilityCriticalityV1 { CAPABILITY_CRITICALITY_V1_UNSPECIFIED = 0; CAPABILITY_CRITICALITY_V1_REQUIRED = 1; CAPABILITY_CRITICALITY_V1_OPTIONAL = 2; }
enum LifecycleOperationV1 { LIFECYCLE_OPERATION_V1_UNSPECIFIED = 0; LIFECYCLE_OPERATION_V1_START = 1; LIFECYCLE_OPERATION_V1_QUIESCE = 2; LIFECYCLE_OPERATION_V1_DRAIN = 3; LIFECYCLE_OPERATION_V1_CHECKPOINT = 4; LIFECYCLE_OPERATION_V1_STOP = 5; LIFECYCLE_OPERATION_V1_HEALTH = 6; LIFECYCLE_OPERATION_V1_RESTART_CAPABILITY = 7; LIFECYCLE_OPERATION_V1_VALIDATE_SETTINGS = 8; LIFECYCLE_OPERATION_V1_APPLY_SETTINGS = 9; }
enum RuntimeHealthV1 { RUNTIME_HEALTH_V1_UNSPECIFIED = 0; RUNTIME_HEALTH_V1_STARTING = 1; RUNTIME_HEALTH_V1_READY = 2; RUNTIME_HEALTH_V1_DEGRADED = 3; RUNTIME_HEALTH_V1_FAILED = 4; RUNTIME_HEALTH_V1_STOPPED = 5; }
enum ProvidedSurfaceKindV1 { PROVIDED_SURFACE_KIND_V1_UNSPECIFIED = 0; PROVIDED_SURFACE_KIND_V1_QUERY_RPC = 1; PROVIDED_SURFACE_KIND_V1_REQUEST_RPC = 2; PROVIDED_SURFACE_KIND_V1_CLIENT_RPC = 3; PROVIDED_SURFACE_KIND_V1_DURABLE_COMMAND = 4; PROVIDED_SURFACE_KIND_V1_DURABLE_PUBLISHER = 5; PROVIDED_SURFACE_KIND_V1_DURABLE_CONSUMER = 6; PROVIDED_SURFACE_KIND_V1_JOB = 7; PROVIDED_SURFACE_KIND_V1_HEALTH_SIGNAL = 8; }

message ContractReferenceV1 { string owner = 1; string name = 2; uint32 major = 3; uint32 revision = 4; bytes schema_sha256 = 5; }
message ProtocolRangeV1 { uint32 minimum_major = 1; uint32 maximum_major = 2; uint32 minimum_revision = 3; }
message RuntimeBudgetRequestV1 { uint32 max_processes = 1; uint32 max_connections = 2; uint64 max_memory_bytes = 3; uint32 max_cpu_millis = 4; }
message SettingsSchemaRefV1 { uint32 major = 1; uint32 revision = 2; uint64 artifact_size_bytes = 3; bytes sha256 = 4; }
message LifecycleSupportV1 { repeated LifecycleOperationV1 operations = 1; uint32 default_deadline_millis = 2; }
message ProvidedSurfaceV1 { ProvidedSurfaceKindV1 kind = 1; ContractReferenceV1 contract = 2; }
message StorageNamespaceRequestV1 { string owner_id = 1; uint32 connection_budget = 2; uint32 timeout_millis = 3; }
enum DurableEnvelopeKindV1 { DURABLE_ENVELOPE_KIND_V1_UNSPECIFIED = 0; DURABLE_ENVELOPE_KIND_V1_COMMAND = 1; DURABLE_ENVELOPE_KIND_V1_EVENT = 2; DURABLE_ENVELOPE_KIND_V1_OBSERVATION = 3; DURABLE_ENVELOPE_KIND_V1_RESULT = 4; DURABLE_ENVELOPE_KIND_V1_ACK = 5; }
enum EventRouteDirectionV1 { EVENT_ROUTE_DIRECTION_V1_UNSPECIFIED = 0; EVENT_ROUTE_DIRECTION_V1_PUBLISH = 1; EVENT_ROUTE_DIRECTION_V1_CONSUME = 2; }
enum EventSubscriptionRequirementV1 { EVENT_SUBSCRIPTION_REQUIREMENT_V1_UNSPECIFIED = 0; EVENT_SUBSCRIPTION_REQUIREMENT_V1_REQUIRED = 1; EVENT_SUBSCRIPTION_REQUIREMENT_V1_OPTIONAL = 2; }
message EventRouteRequestV1 { DurableEnvelopeKindV1 envelope_kind = 1; ContractReferenceV1 contract = 2; EventRouteDirectionV1 direction = 3; uint32 max_in_flight = 4; EventSubscriptionRequirementV1 subscription_requirement = 5; uint32 max_deliver = 6; uint32 ack_wait_millis = 7; }
enum VaultSecretClassV1 { VAULT_SECRET_CLASS_V1_UNSPECIFIED = 0; VAULT_SECRET_CLASS_V1_PROVIDER_CREDENTIAL = 1; VAULT_SECRET_CLASS_V1_OAUTH_REFRESH_CREDENTIAL = 2; VAULT_SECRET_CLASS_V1_SESSION_CREDENTIAL_BLOB = 3; VAULT_SECRET_CLASS_V1_PLATFORM_CREDENTIAL = 4; VAULT_SECRET_CLASS_V1_SESSION_STORE_KEY = 5; VAULT_SECRET_CLASS_V1_OWNER_DERIVED_KEY = 6; }
enum VaultActionV1 { VAULT_ACTION_V1_UNSPECIFIED = 0; VAULT_ACTION_V1_RESOLVE = 1; VAULT_ACTION_V1_CREATE = 2; VAULT_ACTION_V1_REPLACE_CAS = 3; VAULT_ACTION_V1_RETIRE = 4; VAULT_ACTION_V1_DELETE = 5; VAULT_ACTION_V1_ISSUE_SESSION_STORE_KEY = 6; VAULT_ACTION_V1_ISSUE_OWNER_DERIVED_KEY = 7; }
enum VaultTargetScopeV1 { VAULT_TARGET_SCOPE_V1_UNSPECIFIED = 0; VAULT_TARGET_SCOPE_V1_CONFIGURATION_INSTANCE = 1; VAULT_TARGET_SCOPE_V1_OWNER_DERIVED_PROJECTION_KEY = 2; }
message VaultPurposeRequestV1 { string purpose_id = 1; uint32 requested_lease_ttl_seconds = 2; repeated VaultSecretClassV1 allowed_secret_classes = 3; repeated VaultActionV1 actions = 4; VaultTargetScopeV1 target_scope = 5; uint32 key_schema_revision = 6; }
message BlobQuotaRequestV1 { uint64 max_bytes = 1; }
message ClockTimerRequestV1 { bool requires_wall_clock = 1; }
message SchedulerJobRequestV1 { ContractReferenceV1 job_kind = 1; }
message TelemetrySignalRequestV1 { string signal_class = 1; uint32 quota_per_minute = 2; }
message HostCapabilityRequestV1 { string capability_id = 1; }
message CapabilityRequestV1 { oneof request { StorageNamespaceRequestV1 storage_namespace = 1; VaultPurposeRequestV1 vault_purpose = 2; BlobQuotaRequestV1 blob_quota = 3; ClockTimerRequestV1 clock_timer = 4; SchedulerJobRequestV1 scheduler_job = 5; TelemetrySignalRequestV1 telemetry_signal = 6; HostCapabilityRequestV1 host_capability = 7; EventRouteRequestV1 event_route = 8; } }
message CapabilityDescriptorV1 { string capability_id = 1; uint32 capability_revision = 2; CapabilityCriticalityV1 criticality = 3; repeated ProvidedSurfaceV1 provides = 4; repeated CapabilityRequestV1 requests = 5; repeated ContractReferenceV1 dependencies = 6; LifecycleSupportV1 lifecycle_support = 7; RuntimeBudgetRequestV1 resource_budget_request = 8; repeated string settings_definition_ids = 9; }
message ModuleDescriptorV1 { uint32 descriptor_major = 1; uint32 descriptor_revision = 2; string module_id = 3; string owner_id = 4; ModuleKindV1 module_kind = 5; string module_version = 6; string build_id = 7; ProtocolRangeV1 runtime_protocol_range = 8; repeated CapabilityDescriptorV1 capabilities = 9; SettingsSchemaRefV1 settings_schema_ref = 10; RuntimeBudgetRequestV1 runtime_budget_request = 11; string display_name = 12; }
message RuntimeHelloV1 { uint32 protocol_major = 1; uint32 protocol_revision = 2; bytes runtime_instance_id = 3; uint64 runtime_generation = 4; }
message RuntimeHelloResponseV1 { uint32 protocol_major = 1; uint32 protocol_revision = 2; bytes challenge_nonce = 3; }
message DescribeRuntimeRequestV1 { bytes descriptor_bytes = 1; }
message RuntimeHealthStatusV1 { RuntimeHealthV1 health = 1; repeated string ready_capability_ids = 2; repeated string degraded_capability_ids = 3; string sanitized_reason_code = 4; }
message LifecycleControlRequestV1 { LifecycleOperationV1 operation = 1; string capability_id = 2; uint32 deadline_millis = 3; }
message LifecycleControlResponseV1 { bool accepted = 1; RuntimeHealthStatusV1 health = 2; string sanitized_reason_code = 3; }

enum SettingValueTypeV1 { SETTING_VALUE_TYPE_V1_UNSPECIFIED = 0; SETTING_VALUE_TYPE_V1_BOOLEAN = 1; SETTING_VALUE_TYPE_V1_SIGNED_INTEGER = 2; SETTING_VALUE_TYPE_V1_UNSIGNED_INTEGER = 3; SETTING_VALUE_TYPE_V1_DECIMAL = 4; SETTING_VALUE_TYPE_V1_STRING = 5; SETTING_VALUE_TYPE_V1_DURATION = 6; SETTING_VALUE_TYPE_V1_TIMESTAMP = 7; SETTING_VALUE_TYPE_V1_ENUM = 8; SETTING_VALUE_TYPE_V1_RESOURCE_REFERENCE = 9; }
enum SettingMutationAuthorityV1 { SETTING_MUTATION_AUTHORITY_V1_UNSPECIFIED = 0; SETTING_MUTATION_AUTHORITY_V1_OPERATOR_MANAGED = 1; SETTING_MUTATION_AUTHORITY_V1_KERNEL_MANAGED = 2; }
enum SettingTargetScopeV1 { SETTING_TARGET_SCOPE_V1_UNSPECIFIED = 0; SETTING_TARGET_SCOPE_V1_MODULE_REGISTRATION = 1; SETTING_TARGET_SCOPE_V1_CAPABILITY = 2; SETTING_TARGET_SCOPE_V1_CONFIGURATION_INSTANCE = 3; }
enum SettingApplyModeV1 { SETTING_APPLY_MODE_V1_UNSPECIFIED = 0; SETTING_APPLY_MODE_V1_HOT_RELOAD = 1; SETTING_APPLY_MODE_V1_RESTART_CAPABILITY = 2; SETTING_APPLY_MODE_V1_RESTART_MODULE = 3; }
enum SettingClientVisibilityV1 { SETTING_CLIENT_VISIBILITY_V1_UNSPECIFIED = 0; SETTING_CLIENT_VISIBILITY_V1_EDITABLE = 1; SETTING_CLIENT_VISIBILITY_V1_READ_ONLY = 2; SETTING_CLIENT_VISIBILITY_V1_HIDDEN = 3; }
message SettingDefinitionV1 { string setting_id = 1; string capability_id = 2; SettingValueTypeV1 value_type = 3; SettingMutationAuthorityV1 mutation_authority = 4; SettingTargetScopeV1 target_scope = 5; SettingApplyModeV1 apply_mode = 6; SettingClientVisibilityV1 client_visibility = 7; bool fresh_owner_proof_required = 8; string kernel_controller_id = 9; string display_name = 10; }
message SettingsSchemaV1 { uint32 major = 1; uint32 revision = 2; repeated SettingDefinitionV1 definitions = 3; }
message SettingValueV1 { oneof value { bool boolean_value = 1; sint64 signed_integer_value = 2; uint64 unsigned_integer_value = 3; string decimal_value = 4; string string_value = 5; uint64 duration_millis = 6; int64 timestamp_unix_millis = 7; string enum_value = 8; string resource_reference = 9; } }
message SettingsValueEntryV1 { string setting_id = 1; SettingValueV1 value = 2; }
message SettingsSnapshotV1 { string target_id = 1; uint64 revision = 2; repeated SettingsValueEntryV1 values = 3; }

// Transferred only through the one-shot inherited local bootstrap FD. These
// messages are not valid on recovery IPC, registration IPC or any network listener.
message InitialOwnerEnrollmentChallengeV1 { uint32 protocol_major = 1; bytes instance_id = 2; bytes nonce = 3; uint64 kernel_generation = 4; }
message InitialOwnerEnrollmentV1 { uint32 protocol_major = 1; bytes device_public_key_sec1 = 2; bytes challenge_signature_raw = 3; string owner_id = 4; string device_id = 5; }
