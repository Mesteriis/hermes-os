syntax = "proto3";
package hermes.runtime.v1;

enum DistributionArtifactKindV1 {
  DISTRIBUTION_ARTIFACT_KIND_V1_UNSPECIFIED = 0;
  DISTRIBUTION_ARTIFACT_KIND_V1_MODULE_RUNTIME = 1;
  DISTRIBUTION_ARTIFACT_KIND_V1_INFRASTRUCTURE_EXECUTABLE = 2;
  DISTRIBUTION_ARTIFACT_KIND_V1_STORAGE_BUNDLE = 3;
}
message DistributionManifestArtifactV1 {
  DistributionArtifactKindV1 artifact_kind = 1;
  string artifact_id = 2;
  string relative_path = 3;
  uint64 size_bytes = 4;
  bytes sha256 = 5;
  bytes descriptor_sha256 = 6;
  bytes settings_schema_sha256 = 7;
  bool required = 8;
  string descriptor_relative_path = 9;
  uint64 descriptor_size_bytes = 10;
  string settings_schema_relative_path = 11;
  uint64 settings_schema_size_bytes = 12;
}
message DistributionManifestV1 {
  uint32 major = 1;
  uint32 revision = 2;
  string distribution_id = 3;
  string release_version = 4;
  string build_id = 5;
  string target_triple = 6;
  uint64 generation = 7;
  repeated DistributionManifestArtifactV1 artifacts = 8;
}
message SignedDistributionManifestV1 {
  string verification_key_id = 1;
  bytes raw_manifest_bytes = 2;
  bytes signature_raw = 3;
}
message ReleaseTrustRootKeyV1 {
  string key_id = 1;
  bytes public_key_sec1 = 2;
}
message ReleaseTrustRootV1 {
  uint32 major = 1;
  uint32 revision = 2;
  repeated ReleaseTrustRootKeyV1 verification_keys = 3;
}
