syntax = "proto3";

package hermes.runtime.v1;

// Non-secret Storage route for the independently supervised Scheduler. The
// runtime receives the matching database credential only through its inherited
// Vault route; a PostgreSQL URL or password is deliberately not representable.
message SchedulerRuntimeStorageBindingV1 {
  string database_id = 1;
  string pgbouncer_host = 2;
  uint32 pgbouncer_port = 3;
  string runtime_principal = 4;
  uint64 storage_generation = 5;
  uint64 credential_revision = 6;
  string storage_instance_id = 7;
  string owner = 8;
  uint64 role_epoch = 9;
  string pool_alias = 10;
  uint32 max_connections = 11;
  uint32 statement_timeout_millis = 12;
  uint64 storage_bundle_revision = 13;
  bytes storage_bundle_digest = 14;
}

// One Event Hub-authorized pull consumer that carries only Scheduler run
// receipts. Kernel derives this binding from the approved Event Hub topology;
// the managed process cannot substitute a subject, durable name or budget.
message SchedulerRuntimeReceiptConsumerBindingV1 {
  SchedulerRuntimeReceiptKindV1 kind = 1;
  string stream_name = 2;
  string durable_name = 3;
  string filter_subject = 4;
  uint32 ack_wait_millis = 5;
  uint32 max_deliver = 6;
  uint32 max_ack_pending = 7;
}

enum SchedulerRuntimeReceiptKindV1 {
  SCHEDULER_RUNTIME_RECEIPT_KIND_V1_UNSPECIFIED = 0;
  SCHEDULER_RUNTIME_RECEIPT_KIND_V1_ACCEPTANCE = 1;
  SCHEDULER_RUNTIME_RECEIPT_KIND_V1_TERMINAL = 2;
}

// One Event Hub-authorized command subject to which Scheduler may relay an
// already persisted dispatch envelope. Kernel derives this exact allowlist
// from approved publisher topology; Scheduler cannot widen it at runtime.
message SchedulerRuntimeDispatchPublisherBindingV1 {
  string subject = 1;
}

// Desired non-secret state for the Scheduler managed process. Runtime and
// grant generations come from the inherited Kernel descriptor, not this file.
// Each receipt binding is validated against Event Hub topology before Kernel
// writes this file. The bounded sets contain exact command subjects and one or
// more acceptance/terminal pairs for approved owner receipt contracts; they
// are not runtime-selected.
message SchedulerRuntimeConfigurationV1 {
  SchedulerRuntimeStorageBindingV1 storage_binding = 1;
  string vault_instance_id = 2;
  uint64 vault_runtime_generation = 3;
  bytes vault_hpke_public_key_x25519 = 4;
  string nats_endpoint = 5;
  uint64 event_credential_revision = 6;
  uint32 dispatch_batch_limit = 7;
  uint32 receipt_batch_limit = 8;
  uint32 reconcile_interval_millis = 9;
  repeated SchedulerRuntimeReceiptConsumerBindingV1 receipt_consumers = 10;
  // Exact managed identity accepted during the inherited descriptor handshake.
  // It is public launch metadata, not a client or owner-selected value.
  string runtime_instance_id = 11;
  string logical_owner_id = 12;
  repeated SchedulerRuntimeDispatchPublisherBindingV1 dispatch_publishers = 13;
}

enum SchedulerRuntimeStateV1 {
  SCHEDULER_RUNTIME_STATE_V1_UNSPECIFIED = 0;
  SCHEDULER_RUNTIME_STATE_V1_READY = 1;
  SCHEDULER_RUNTIME_STATE_V1_BLOCKED = 2;
  SCHEDULER_RUNTIME_STATE_V1_STOPPED = 3;
}

message GetSchedulerRuntimeStatusRequestV1 {}

// One exact owner-authorized Scheduler schedule mutation. The control channel
// is authenticated as the current Kernel-supervised Scheduler runtime; callers
// cannot choose a database endpoint, NATS subject, executable, or arbitrary
// business payload. `policy_canonical_bytes` is the versioned canonical
// Scheduler policy encoding, not an opaque owner payload.
message UpsertSchedulerScheduleRequestV1 {
  bytes schedule_id = 1;
  uint64 schedule_revision = 2;
  string job_owner = 3;
  string job_name = 4;
  uint32 job_major = 5;
  string contract_name = 6;
  uint32 contract_revision = 7;
  bytes contract_schema_sha256 = 8;
  string scope_id = 9;
  string concurrency_key = 10;
  bool enabled = 11;
  bytes policy_canonical_bytes = 12;
  int64 next_due_at_unix_millis = 13;
  int64 updated_at_unix_millis = 14;
}

enum SchedulerScheduleUpsertOutcomeV1 {
  SCHEDULER_SCHEDULE_UPSERT_OUTCOME_V1_UNSPECIFIED = 0;
  SCHEDULER_SCHEDULE_UPSERT_OUTCOME_V1_INSERTED = 1;
  SCHEDULER_SCHEDULE_UPSERT_OUTCOME_V1_UPDATED = 2;
  SCHEDULER_SCHEDULE_UPSERT_OUTCOME_V1_UNCHANGED = 3;
}

message UpsertSchedulerScheduleResponseV1 {
  SchedulerScheduleUpsertOutcomeV1 outcome = 1;
  uint64 schedule_revision = 2;
}

// Sanitized liveness only. It cannot carry credentials, an owner payload,
// JobKind descriptors, a NATS subject, or pending dispatch contents.
message SchedulerRuntimeStatusV1 {
  SchedulerRuntimeStateV1 state = 1;
  uint64 runtime_generation = 2;
  uint64 grant_epoch = 3;
  uint64 storage_generation = 4;
  uint64 vault_runtime_generation = 5;
  uint64 event_credential_revision = 6;
  string blocker_code = 7;
}

message SchedulerRuntimeControlRequestV1 {
  oneof operation {
    GetSchedulerRuntimeStatusRequestV1 get_status = 1;
    UpsertSchedulerScheduleRequestV1 upsert_schedule = 2;
  }
}

message SchedulerRuntimeControlResponseV1 {
  oneof result {
    SchedulerRuntimeStatusV1 status = 1;
    UpsertSchedulerScheduleResponseV1 upsert_schedule = 2;
  }
  string error_code = 15;
}
