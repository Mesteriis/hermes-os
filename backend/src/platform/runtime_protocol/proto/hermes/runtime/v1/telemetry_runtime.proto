syntax = "proto3";

package hermes.runtime.v1;

// Private, aggregate-only control plane for a Kernel-managed Telemetry Collector.
message GetTelemetryDiagnosticsRequestV1 {}

message TelemetryDiagnosticsV1 {
  uint32 segment_count = 1;
  uint64 total_bytes = 2;
}

message TelemetryRuntimeControlRequestV1 {
  oneof operation {
    GetTelemetryDiagnosticsRequestV1 get_diagnostics = 1;
  }
}

message TelemetryRuntimeControlResponseV1 {
  oneof result {
    TelemetryDiagnosticsV1 diagnostics = 1;
  }
  string error_code = 15;
}
