syntax = "proto3";

package hermes.runtime.v1;

// Short-lived private configuration staged by Kernel for one admitted
// host-only integration runtime. The endpoint is a transport boundary only:
// it does not define provider operations or carry provider state.
message ManagedIntegrationHostBridgeConfigurationV1 {
  uint32 major = 1;
  string kernel_instance_id = 2;
  string owner_id = 3;
  string registration_id = 4;
  string runtime_instance_id = 5;
  uint64 runtime_generation = 6;
  uint64 grant_epoch = 7;
  string socket_path = 8;
  bytes route_binding_sha256 = 9;
}
