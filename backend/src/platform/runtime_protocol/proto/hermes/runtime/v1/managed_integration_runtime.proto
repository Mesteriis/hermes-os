syntax = "proto3";

package hermes.runtime.v1;

import "hermes/runtime/v1/managed_storage_runtime.proto";

// Short-lived private configuration staged by Kernel for an admitted provider
// integration. It carries only bounded runtime identity, event topology and
// owner-local storage fences. Provider credentials are issued and resolved on
// the inherited Vault route and are not representable in this message.
message ManagedIntegrationRuntimeConfigurationV1 {
  uint32 major = 1;
  string logical_owner_id = 2;
  string registration_id = 3;
  string runtime_instance_id = 4;
  uint64 runtime_generation = 5;
  uint64 grant_epoch = 6;
  ManagedStorageRuntimeConfigurationV1 storage = 7;
  string event_hub_endpoint = 8;
  uint64 event_credential_revision = 9;
  string configuration_instance_id = 10;
}
