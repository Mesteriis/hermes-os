[package]
name = "hermes-storage-pgbouncer"
version = "0.1.0"
edition = "2024"
[lib]
path = "src/lib.rs"
[package.metadata.hermes]
role = "platform"
owner = "storage"
surface = "implementation"
[dependencies]
hermes-storage-control = { path = "../control" }
hermes-storage-protocol = { path = "../protocol" }
libc = "=0.2.186"
tokio = { version = "=1.52.4", default-features = false, features = ["rt", "time"] }
tokio-postgres = { version = "=0.7.16", default-features = false, features = ["runtime"] }
zeroize = "=1.9.0"
