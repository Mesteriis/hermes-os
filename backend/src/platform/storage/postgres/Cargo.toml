[package]
name = "hermes-storage-postgres"
version = "0.1.0"
edition = "2024"
license = "MIT"
[lib]
path = "src/lib.rs"
[package.metadata.hermes]
role = "platform"
owner = "storage"
surface = "persistence"
[dependencies]
hermes-storage-control = { path = "../control" }
hermes-storage-migrations = { path = "../migrations" }
hermes-storage-protocol = { path = "../protocol" }
getrandom = { version = "=0.4.3", default-features = false }
libc = "=0.2.186"
sha2 = { version = "=0.11.0", default-features = false }
sqlx = { version = "=0.8.6", default-features = false, features = ["postgres", "runtime-tokio-rustls"] }
zeroize = "=1.9.0"
