[package]
name = "hermes-storage-runtime"
version = "0.1.0"
edition = "2024"
[[bin]]
name = "hermes-storage-runtime"
path = "src/main.rs"
[package.metadata.hermes]
role = "platform"
owner = "storage"
surface = "runtime"
components = ["storage_control"]
[dependencies]
hermes-storage-protocol = { path = "../protocol" }
hermes-storage-control = { path = "../control" }
hermes-storage-postgres = { path = "../postgres" }
hermes-storage-pgbouncer = { path = "../pgbouncer" }
hermes-storage-migrations = { path = "../migrations" }
hermes-runtime-protocol = { path = "../../runtime_protocol" }
hermes-storage-vault = { path = "../vault" }
hermes-vault-protocol = { path = "../../vault/protocol" }
libc = "=0.2.186"
prost = "=0.14.4"
sha2 = { version = "=0.11.0", default-features = false }
tokio = { version = "=1.52.4", default-features = false, features = ["net", "rt", "time"] }
zeroize = "=1.9.0"
