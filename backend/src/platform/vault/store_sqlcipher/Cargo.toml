[package]
name = "hermes-vault-store-sqlcipher"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "platform"
owner = "vault"
surface = "persistence"

[dependencies]
bip39 = { version = "=2.2.2", default-features = false, features = ["std"] }
chacha20poly1305 = { version = "=0.11.0", default-features = false, features = ["alloc", "zeroize"] }
getrandom = { version = "=0.4.3", default-features = false }
hermes-vault-key-provider = { path = "../key_provider" }
hermes-vault-protocol = { path = "../protocol" }
hkdf = "=0.13.0"
libc = "=0.2.186"
rusqlite = { version = "=0.40.1", default-features = false, features = ["backup", "bundled-sqlcipher"] }
sha2 = { version = "=0.11.0", default-features = false }
zeroize = "=1.9.0"
