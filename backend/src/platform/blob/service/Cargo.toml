[package]
name = "hermes-blob-service"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "hermes-blob-service"
path = "src/main.rs"

[package.metadata.hermes]
role = "platform"
owner = "blob"
surface = "runtime"

[dependencies]
hermes-blob-runtime = { path = "../runtime" }
hermes-blob-protocol = { path = "../protocol" }
hermes-runtime-protocol = { path = "../../runtime_protocol" }
hermes-vault-protocol = { path = "../../vault/protocol" }
libc = "=0.2.186"
p256 = { version = "=0.14.0", default-features = false, features = ["ecdsa"] }
prost = "=0.14.4"
sha2 = { version = "=0.11.0", default-features = false }
