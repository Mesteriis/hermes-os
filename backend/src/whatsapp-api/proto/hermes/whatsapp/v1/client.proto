syntax = "proto3";

package hermes.whatsapp.v1;

message WhatsAppHostBridgeRequestV1 {
  uint32 protocol_major = 1;
  uint32 protocol_revision = 2;
  string account_id = 3;
  string provider_event_id = 4;
  int64 observed_at_unix_seconds = 5;
  oneof observation {
    RuntimeState runtime_state = 10;
    MessageIdentity message_identity = 11;
    MessageUpdated message_updated = 12;
    MessageDeleted message_deleted = 13;
    Receipt receipt = 14;
    Reaction reaction = 15;
    Dialog dialog = 16;
    Participant participant = 17;
    Presence presence = 18;
    MediaMetadata media_metadata = 19;
    CallMetadata call_metadata = 20;
    StatusMetadata status_metadata = 21;
    StatusViewMetadata status_view_metadata = 22;
    StatusDeletedMetadata status_deleted_metadata = 23;
    SessionLinkedMetadata session_linked = 24;
    SessionRevokedMetadata session_revoked = 25;
    CommandResultMetadata command_result = 26;
  }
}

// The native host proves possession of the exact short-lived route descriptor
// before it can submit an observation or lease a provider command.
message WhatsAppHostBridgeHandshakeV1 {
  uint32 protocol_major = 1;
  uint32 protocol_revision = 2;
  bytes route_binding_sha256 = 3;
}
message WhatsAppHostBridgeHandshakeAcceptedV1 {
  uint32 protocol_major = 1;
  uint32 protocol_revision = 2;
}

message RuntimeState { string state = 1; }
message MessageIdentity { string provider_chat_id = 1; string provider_message_id = 2; string sender_id = 3; }
message MessageUpdated { string provider_chat_id = 1; string provider_message_id = 2; }
message MessageDeleted { string provider_chat_id = 1; string provider_message_id = 2; }
message Receipt { string provider_chat_id = 1; string provider_message_id = 2; string delivery_state = 3; }
message Reaction { string provider_chat_id = 1; string provider_message_id = 2; string actor_id = 3; optional string emoji = 4; bool is_active = 5; }
message Dialog { string provider_chat_id = 1; string title = 2; string kind = 3; }
message Participant { string provider_chat_id = 1; string provider_identity_id = 2; string display_name = 3; }
message Presence { string provider_chat_id = 1; string provider_identity_id = 2; string state = 3; }
message MediaMetadata { string provider_chat_id = 1; string provider_message_id = 2; string provider_media_id = 3; string media_kind = 4; optional string filename = 5; optional string content_type = 6; optional uint64 declared_size = 7; }
message CallMetadata { string provider_call_id = 1; string provider_chat_id = 2; string direction = 3; string state = 4; }
message StatusMetadata { string provider_status_id = 1; string sender_id = 2; }
message StatusViewMetadata { string provider_status_id = 1; string viewer_id = 2; }
message StatusDeletedMetadata { string provider_status_id = 1; }
message SessionLinkedMetadata { string secret_ref = 1; uint64 revision = 2; }
message SessionRevokedMetadata {}
message CommandResultMetadata { string operation_id = 1; optional string provider_request_id = 2; bool succeeded = 3; string host_claim_id = 4; }

message WhatsAppObservationAcceptedV1 { string provider_event_id = 1; }
message WhatsAppOperationAcceptedV1 { string operation_id = 1; }
message WhatsAppHostCommandFailureV1 { string operation_id = 1; string host_claim_id = 2; string reason = 3; }
message WhatsAppHostCommandFailureRecordedV1 { string operation_id = 1; }
message WhatsAppRetryCommandV1 { string operation_id = 1; }
message WhatsAppDeadLetterCommandV1 { string operation_id = 1; string reason = 2; }
message WhatsAppCommandLifecycleResponseV1 { string operation_id = 1; string state = 2; }
message WhatsAppClientResponseV1 {
  oneof response {
    WhatsAppAccountResponseV1 account = 1;
    WhatsAppObservationAcceptedV1 observation_accepted = 2;
    WhatsAppOperationAcceptedV1 accepted = 3;
    WhatsAppHostCommandFailureRecordedV1 host_command_failure_recorded = 4;
    WhatsAppCommandLifecycleResponseV1 command_lifecycle_updated = 5;
    WhatsAppQueryResponseV1 query = 6;
  }
}

message WhatsAppLifecycleRequestV1 {
  oneof request {
    ProvisionAccountRequest provision = 101;
    AccountIdRequest start = 102;
    AccountIdRequest stop = 103;
    AccountIdRequest revoke = 104;
    AccountIdRequest relink = 105;
    AccountIdRequest remove = 106;
  }
}
message ProvisionAccountRequest {
  string account_id = 1;
  string display_name = 2;
  string external_account_id = 3;
  string provider_shape = 4;
  string runtime_kind = 5;
  repeated WhatsAppCredentialBindingV1 credential = 6;
}
message WhatsAppCredentialBindingV1 {
  string purpose = 1;
  string secret_ref = 2;
  uint64 revision = 3;
}
message AccountIdRequest { string account_id = 1; }
message WhatsAppAccountResponseV1 {
  string account_id = 1;
  string display_name = 2;
  string external_account_id = 3;
  string provider_shape = 4;
  string runtime_kind = 5;
  string account_state = 6;
  string runtime_state = 7;
}

message WhatsAppProviderCommandV1 {
  oneof command {
    SendTextCommand send_text = 1;
    ReplyCommand reply = 2;
    ForwardCommand forward = 3;
    EditCommand edit = 4;
    DeleteCommand delete = 5;
    ReactCommand react = 6;
    UnreactCommand unreact = 7;
    SendMediaCommand send_media = 8;
    DownloadMediaCommand download_media = 9;
    PublishStatusCommand publish_status = 10;
    JoinConversationCommand join_conversation = 11;
    LeaveConversationCommand leave_conversation = 12;
    ConversationCommand conversation = 13;
    SendVoiceNoteCommand send_voice_note = 14;
  }
}

message SendTextCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string text = 4; }
message ReplyCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string reply_to_provider_message_id = 4; string text = 5; }
message ForwardCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string source_provider_chat_id = 4; string source_provider_message_id = 5; }
message EditCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string provider_message_id = 4; string text = 5; }
message DeleteCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string provider_message_id = 4; }
message ReactCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string provider_message_id = 4; string emoji = 5; }
message UnreactCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string provider_message_id = 4; string emoji = 5; }
message SendMediaCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string blob_ref = 4; string media_kind = 5; optional string caption = 6; optional string filename = 7; }
message DownloadMediaCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string provider_message_id = 4; string provider_media_id = 5; }
message PublishStatusCommand { string operation_id = 1; string account_id = 2; string text = 3; }
message JoinConversationCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; string invite_link = 4; }
message LeaveConversationCommand { string operation_id = 1; string account_id = 2; string provider_chat_id = 3; }
enum DialogCommandAction {
  DIALOG_COMMAND_ACTION_UNSPECIFIED = 0;
  DIALOG_COMMAND_ACTION_MARK_READ = 1;
  DIALOG_COMMAND_ACTION_MARK_UNREAD = 2;
  DIALOG_COMMAND_ACTION_ARCHIVE = 3;
  DIALOG_COMMAND_ACTION_UNARCHIVE = 4;
  DIALOG_COMMAND_ACTION_MUTE = 5;
  DIALOG_COMMAND_ACTION_UNMUTE = 6;
  DIALOG_COMMAND_ACTION_PIN = 7;
  DIALOG_COMMAND_ACTION_UNPIN = 8;
}
message ConversationCommand {
  string operation_id = 1;
  string account_id = 2;
  string provider_chat_id = 3;
  DialogCommandAction action = 4;
}
message SendVoiceNoteCommand {
  string operation_id = 1;
  string account_id = 2;
  string provider_chat_id = 3;
  string attachment_id = 4;
  string blob_ref = 5;
  string content_type = 6;
  uint64 declared_size = 7;
  string sha256 = 8;
  string scan_status = 9;
  optional string filename = 10;
}

message WhatsAppProviderQueryV1 {
  oneof query {
    AccountQuery account = 9;
    CachedMessagesQuery cached_messages = 1;
    SearchMessagesQuery search_messages = 2;
    DialogsQuery dialogs = 3;
    ParticipantsQuery participants = 4;
    ReplayQuery replay = 5;
    PendingCommandsQuery pending_commands = 6;
    ClaimPendingCommandsQuery claim_pending_commands = 7;
    EventsQuery events = 8;
    RuntimeStatusQuery runtime_status = 10;
  }
}

enum ProviderEventKind {
  PROVIDER_EVENT_KIND_UNSPECIFIED = 0;
  PROVIDER_EVENT_KIND_RUNTIME_STATE = 1;
  PROVIDER_EVENT_KIND_MESSAGE = 2;
  PROVIDER_EVENT_KIND_MESSAGE_EDITED = 3;
  PROVIDER_EVENT_KIND_MESSAGE_DELETED = 4;
  PROVIDER_EVENT_KIND_RECEIPT = 5;
  PROVIDER_EVENT_KIND_REACTION = 6;
  PROVIDER_EVENT_KIND_DIALOG = 7;
  PROVIDER_EVENT_KIND_PARTICIPANT = 8;
  PROVIDER_EVENT_KIND_PRESENCE = 9;
  PROVIDER_EVENT_KIND_CALL = 10;
  PROVIDER_EVENT_KIND_STATUS = 11;
  PROVIDER_EVENT_KIND_STATUS_VIEW = 12;
  PROVIDER_EVENT_KIND_STATUS_DELETED = 13;
  PROVIDER_EVENT_KIND_MEDIA = 14;
  PROVIDER_EVENT_KIND_SESSION = 15;
  PROVIDER_EVENT_KIND_COMMAND_RESULT = 16;
}

message AccountQuery { string account_id = 1; }
message CachedMessagesQuery { string account_id = 1; optional string provider_chat_id = 2; uint32 limit = 3; }
message SearchMessagesQuery { string account_id = 1; optional string provider_chat_id = 2; string query = 3; uint32 limit = 4; }
message DialogsQuery { string account_id = 1; uint32 limit = 2; }
message ParticipantsQuery { string account_id = 1; string provider_chat_id = 2; uint32 limit = 3; }
message ReplayQuery { string account_id = 1; uint64 after_sequence = 2; uint32 limit = 3; }
message PendingCommandsQuery { string account_id = 1; uint32 limit = 2; }
message ClaimPendingCommandsQuery { string account_id = 1; string host_claim_id = 2; uint32 lease_seconds = 3; uint32 limit = 4; }
message EventsQuery { string account_id = 1; ProviderEventKind kind = 2; optional string provider_chat_id = 3; uint32 limit = 4; }

message WhatsAppQueryResponseV1 {
  oneof response {
    WhatsAppMessageList messages = 1;
    WhatsAppDialogList dialogs = 2;
    WhatsAppParticipantList participants = 3;
    WhatsAppRealtimeList realtime = 4;
    WhatsAppCommandList commands = 5;
    WhatsAppProviderEventList events = 6;
    WhatsAppAccountList account = 7;
    WhatsAppRuntimeStatusV1 runtime_status = 8;
  }
}
message WhatsAppAccountList { repeated WhatsAppAccountResponseV1 account = 1; }
message RuntimeStatusQuery { string account_id = 1; }
message WhatsAppRuntimeStatusV1 {
  string account_id = 1;
  optional string account_state = 2;
  optional string runtime_state = 3;
  repeated WhatsAppCapability capability = 4;
  bool host_command_queue_available = 5;
}
message WhatsAppCapability {
  string capability = 1;
  string category = 2;
  string status = 3;
  string action_class = 4;
  bool confirmation_required = 5;
  bool closure_gate = 6;
  string reason = 7;
}
message WhatsAppMessageList { repeated WhatsAppMessage message = 1; }
message WhatsAppDialogList { repeated WhatsAppDialog dialog = 1; }
message WhatsAppParticipantList { repeated WhatsAppParticipant participant = 1; }
message WhatsAppRealtimeList { repeated WhatsAppRealtimeFrame frame = 1; }
message WhatsAppCommandList { repeated WhatsAppProviderCommandV1 command = 1; }
message WhatsAppProviderEventList { repeated WhatsAppProviderEventV1 event = 1; }
message WhatsAppMessage {
  string account_id = 1;
  string provider_chat_id = 2;
  string provider_message_id = 3;
  string sender_id = 4;
  string sender_display_name = 5;
  optional string text = 6;
  optional string reply_to_provider_message_id = 7;
  int64 occurred_at_unix_seconds = 8;
}
message WhatsAppDialog {
  string account_id = 1;
  string provider_chat_id = 2;
  string title = 3;
  string kind = 4;
  optional bool is_archived = 5;
  optional bool is_pinned = 6;
  optional bool is_muted = 7;
  optional bool is_unread = 8;
  optional uint64 unread_count = 9;
  optional uint64 participant_count = 10;
  int64 observed_at_unix_seconds = 11;
}
message WhatsAppParticipant {
  string account_id = 1;
  string provider_chat_id = 2;
  string provider_identity_id = 3;
  string display_name = 4;
  string role = 5;
  string status = 6;
  bool is_self = 7;
  int64 observed_at_unix_seconds = 8;
}
message WhatsAppRealtimeFrame {
  string account_id = 1;
  uint64 sequence = 2;
  WhatsAppProviderEventV1 event = 3;
}

message WhatsAppProviderEventV1 {
  oneof event {
    RuntimeStateChangedEvent runtime_state_changed = 1;
    WhatsAppMessage message_observed = 2;
    MessageEditedEvent message_edited = 3;
    MessageDeletedEvent message_deleted = 4;
    ReceiptChangedEvent receipt_changed = 5;
    ReactionChangedEvent reaction_changed = 6;
    WhatsAppDialog dialog_observed = 7;
    WhatsAppParticipant participant_observed = 8;
    PresenceChangedEvent presence_changed = 9;
    CallObservedEvent call_observed = 10;
    StatusObservedEvent status_observed = 11;
    StatusViewObservedEvent status_view_observed = 12;
    StatusDeletedEvent status_deleted = 13;
    WhatsAppMedia media_observed = 14;
    SessionStateChangedEvent session_state_changed = 15;
    CommandResultObservedEvent command_result_observed = 16;
  }
}
message RuntimeStateChangedEvent { string account_id = 1; string state = 2; int64 observed_at_unix_seconds = 3; }
message MessageEditedEvent { string account_id = 1; string provider_chat_id = 2; string provider_message_id = 3; optional string text = 4; int64 observed_at_unix_seconds = 5; }
message MessageDeletedEvent { string account_id = 1; string provider_chat_id = 2; string provider_message_id = 3; int64 observed_at_unix_seconds = 4; }
message ReceiptChangedEvent { string account_id = 1; string provider_chat_id = 2; string provider_message_id = 3; string delivery_state = 4; int64 observed_at_unix_seconds = 5; }
message ReactionChangedEvent { string account_id = 1; string provider_chat_id = 2; string provider_message_id = 3; string actor_id = 4; optional string emoji = 5; bool is_active = 6; int64 observed_at_unix_seconds = 7; }
message PresenceChangedEvent { string account_id = 1; string provider_chat_id = 2; string provider_identity_id = 3; string state = 4; int64 observed_at_unix_seconds = 5; }
message CallObservedEvent { string account_id = 1; string provider_call_id = 2; string provider_chat_id = 3; string direction = 4; string state = 5; int64 observed_at_unix_seconds = 6; }
message StatusObservedEvent { string account_id = 1; string provider_status_id = 2; string sender_id = 3; optional string text = 4; int64 observed_at_unix_seconds = 5; }
message StatusViewObservedEvent { string account_id = 1; string provider_status_id = 2; string viewer_id = 3; int64 observed_at_unix_seconds = 4; }
message StatusDeletedEvent { string account_id = 1; string provider_status_id = 2; int64 observed_at_unix_seconds = 3; }
message WhatsAppMedia { string account_id = 1; string provider_chat_id = 2; string provider_message_id = 3; string provider_media_id = 4; string media_kind = 5; optional string filename = 6; optional string content_type = 7; optional uint64 declared_size = 8; int64 observed_at_unix_seconds = 9; }
message SessionStateChangedEvent { string account_id = 1; bool linked = 2; optional string secret_ref = 3; optional uint64 revision = 4; int64 observed_at_unix_seconds = 5; }
message CommandResultObservedEvent { string account_id = 1; string operation_id = 2; optional string provider_request_id = 3; bool succeeded = 4; int64 observed_at_unix_seconds = 5; }
