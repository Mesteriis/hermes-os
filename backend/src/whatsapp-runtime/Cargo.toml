[package]
name = "hermes-whatsapp-runtime"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
name = "hermes_whatsapp_runtime"
path = "src/lib.rs"

[[bin]]
name = "hermes-whatsapp-runtime"
path = "src/main.rs"

[package.metadata.hermes]
role = "integration"
owner = "whatsapp"
surface = "runtime"

[dependencies]
hermes-runtime-protocol = { path = "../platform/runtime_protocol" }
hermes-storage-protocol = { path = "../platform/storage/protocol" }
hermes-storage-vault = { path = "../platform/storage/vault" }
hermes-whatsapp-api = { path = "../whatsapp-api" }
hermes-whatsapp-core = { path = "../whatsapp-core" }
hermes-whatsapp-persistence = { path = "../whatsapp-persistence" }
hermes-vault-protocol = { path = "../platform/vault/protocol" }
getrandom = { version = "=0.4.3", default-features = false }
libc = "=0.2.186"
prost = "=0.14.4"
serde_json = "=1.0.150"
tokio = { version = "=1.52.4", default-features = false, features = ["rt", "rt-multi-thread", "time"] }
zeroize = "=1.9.0"
