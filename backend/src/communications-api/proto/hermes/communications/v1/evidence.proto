syntax = "proto3";

package hermes.communications.v1;

// Canonical evidence event. It carries no provider locator, message body,
// session material, generic metadata map, or integration-specific DTO.
message CommunicationEvidenceRecordedV1 {
  bytes evidence_id = 1;
  bytes source_cursor_sha256 = 2;
  CommunicationProviderProvenanceV1 provider = 3;
  CommunicationEvidenceKindV1 kind = 4;
  CommunicationBodyStateV1 body = 5;
  int64 observed_at_unix_seconds = 6;
  bytes account_cursor_sha256 = 7;
  bytes conversation_cursor_sha256 = 8;
  bytes participant_cursor_sha256 = 9;
  bytes media_cursor_sha256 = 10;
  bytes reply_to_source_cursor_sha256 = 11;
  bytes forward_origin_source_cursor_sha256 = 12;
  CommunicationDirectionV1 direction = 13;
}

enum CommunicationProviderProvenanceV1 {
  COMMUNICATION_PROVIDER_PROVENANCE_V1_UNSPECIFIED = 0;
  COMMUNICATION_PROVIDER_PROVENANCE_V1_MAIL_IMAP = 1;
  COMMUNICATION_PROVIDER_PROVENANCE_V1_TELEGRAM = 2;
  COMMUNICATION_PROVIDER_PROVENANCE_V1_WHATSAPP_WEB = 3;
  COMMUNICATION_PROVIDER_PROVENANCE_V1_MAIL_SMTP = 4;
  COMMUNICATION_PROVIDER_PROVENANCE_V1_ZULIP = 5;
}

enum CommunicationDirectionV1 {
  COMMUNICATION_DIRECTION_V1_UNSPECIFIED = 0;
  COMMUNICATION_DIRECTION_V1_INCOMING = 1;
  COMMUNICATION_DIRECTION_V1_OUTGOING = 2;
  COMMUNICATION_DIRECTION_V1_UNKNOWN = 3;
}

enum CommunicationEvidenceKindV1 {
  COMMUNICATION_EVIDENCE_KIND_V1_UNSPECIFIED = 0;
  COMMUNICATION_EVIDENCE_KIND_V1_EMAIL_MESSAGE = 1;
  COMMUNICATION_EVIDENCE_KIND_V1_CHAT_MESSAGE = 2;
  COMMUNICATION_EVIDENCE_KIND_V1_MESSAGE_EDITED = 3;
  COMMUNICATION_EVIDENCE_KIND_V1_MESSAGE_DELETED = 4;
  COMMUNICATION_EVIDENCE_KIND_V1_REACTION_CHANGED = 5;
  COMMUNICATION_EVIDENCE_KIND_V1_DELIVERY_STATE_CHANGED = 6;
  COMMUNICATION_EVIDENCE_KIND_V1_CONVERSATION_STATE_CHANGED = 7;
  COMMUNICATION_EVIDENCE_KIND_V1_PARTICIPANT_CHANGED = 8;
  COMMUNICATION_EVIDENCE_KIND_V1_MEDIA_CHANGED = 9;
  COMMUNICATION_EVIDENCE_KIND_V1_TOPIC_CHANGED = 10;
  COMMUNICATION_EVIDENCE_KIND_V1_TYPING_CHANGED = 11;
}

enum CommunicationBodyStateV1 {
  COMMUNICATION_BODY_STATE_V1_UNSPECIFIED = 0;
  COMMUNICATION_BODY_STATE_V1_METADATA_ONLY = 1;
  COMMUNICATION_BODY_STATE_V1_PENDING_BLOB = 2;
  COMMUNICATION_BODY_STATE_V1_UNAVAILABLE = 3;
}
