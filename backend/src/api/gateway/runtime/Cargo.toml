[package]
name = "hermes-gateway-runtime"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "api"
owner = "gateway"
surface = "implementation"

[dependencies]
base64 = "=0.22.1"
bytes = "=1.12.1"
futures-util = "=0.3.32"
h3 = "=0.0.8"
h3-quinn = "=0.0.10"
hermes-gateway-protocol = { path = "../contracts" }
hermes-gateway-session = { path = "../session" }
hermes-gateway-session-contract = { path = "../session_contract" }
http-body-util = "=0.1.3"
hyper = { version = "=1.10.1", default-features = false, features = ["http1", "http2", "server"] }
hyper-util = { version = "=0.1.20", default-features = false, features = ["tokio"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
prost = "=0.14.4"
quinn = "=0.11.7"
tokio = { version = "=1.52.4", default-features = false, features = ["io-util", "macros", "net", "rt", "sync"] }
tokio-rustls = "=0.26.4"
webauthn-rs-core = "=0.5.5"
