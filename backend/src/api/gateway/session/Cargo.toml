[package]
name = "hermes-gateway-session"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "api"
owner = "gateway"
surface = "implementation"

[dependencies]
getrandom = { version = "=0.4.3", default-features = false }
hermes-gateway-session-contract = { path = "../session_contract" }
p256 = { version = "=0.14.0", default-features = false, features = ["ecdsa"] }
serde_cbor_2 = "=0.13.0"
url = "=2.5.8"
webauthn-rs-core = "=0.5.5"
