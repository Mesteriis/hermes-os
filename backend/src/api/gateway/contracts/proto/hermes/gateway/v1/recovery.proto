syntax = "proto3";

package hermes.gateway.v1;

import "hermes/runtime/v1/recovery.proto";

message GetRecoveryStatusRequestV1 {}

message GetRecoveryStatusResponseV1 {
  hermes.runtime.v1.RecoveryStatusV1 status = 1;
}

message ValidateControlStoreRequestV1 {}

message ValidateControlStoreResponseV1 {
  hermes.runtime.v1.RecoveryStatusV1 status = 1;
}

message ExportControlStoreRequestV1 {}

message ExportControlStoreResponseV1 {
  bytes export_sha256 = 1;
  uint64 export_size_bytes = 2;
}

message ShutdownKernelRequestV1 {}

message ShutdownKernelResponseV1 {}

// Framed over the owner-private Unix socket using protobuf length-delimited
// messages. This envelope deliberately exposes only the recovery operations
// admitted by ADR-0225; it is not a general gateway request carrier.
message RecoveryControlRequestV1 {
  oneof operation {
    GetRecoveryStatusRequestV1 get_recovery_status = 1;
    ValidateControlStoreRequestV1 validate_control_store = 2;
    ExportControlStoreRequestV1 export_control_store = 3;
    ShutdownKernelRequestV1 shutdown_kernel = 4;
  }
}

message RecoveryControlResponseV1 {
  oneof result {
    GetRecoveryStatusResponseV1 get_recovery_status = 1;
    ValidateControlStoreResponseV1 validate_control_store = 2;
    ExportControlStoreResponseV1 export_control_store = 3;
    ShutdownKernelResponseV1 shutdown_kernel = 4;
  }

  // Sanitized, stable code only; private store details never cross IPC.
  string error_code = 15;
}
