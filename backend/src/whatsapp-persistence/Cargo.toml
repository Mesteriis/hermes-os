[package]
name = "hermes-whatsapp-persistence"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "integration"
owner = "whatsapp"
surface = "persistence"

[dependencies]
hermes-storage-protocol = { path = "../platform/storage/protocol" }
hermes-whatsapp-api = { path = "../whatsapp-api" }
hermes-whatsapp-core = { path = "../whatsapp-core" }
serde = { version = "=1.0.228", default-features = false, features = ["derive"] }
serde_json = "=1.0.150"
sqlx = { version = "=0.8.6", default-features = false, features = ["json", "postgres", "runtime-tokio-rustls"] }
