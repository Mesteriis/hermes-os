[package]
name = "hermes-zulip-persistence"
version = "0.1.0"
edition = "2024"
license = "MIT"
[lib]
path = "src/lib.rs"
[package.metadata.hermes]
role = "integration"
owner = "zulip"
surface = "persistence"
[dependencies]
hermes-events-protocol = { path = "../platform/events" }
hermes-storage-protocol = { path = "../platform/storage/protocol" }
hermes-zulip-api = { path = "../zulip-api" }
sqlx = { version = "=0.9.0", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls-ring"] }
