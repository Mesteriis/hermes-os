%include /etc/hermes/runtime/databases.ini

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/hermes/auth/users.txt
admin_users = hermes_pgbouncer_admin
pool_mode = transaction
max_client_conn = 32
default_pool_size = 8
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
