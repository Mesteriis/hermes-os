name: hermes-storage-authenticated-development

# Disposable authenticated Storage contour. Its password is supplied only as a
# Docker secret file by scripts/test-authenticated-storage.mjs; never add a
# secret file to this directory or use environment variables for it.
services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/var/lib/hermes", "-m", "8222"]
    ports:
      - 127.0.0.1:43225:4222
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes_storage_authenticated
      POSTGRES_USER: hermes_postgres_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/storage_postgres_admin_password
    ports:
      - 127.0.0.1:35532:5432
    secrets:
      - storage_postgres_admin_password
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes_storage_admin -d hermes_storage_authenticated"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    user: "${HERMES_STORAGE_PGBOUNCER_RUNTIME_UID:?PgBouncer runtime UID is required}"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/etc/hermes/boot.sh"]
    command: ["/usr/bin/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    ports:
      - 127.0.0.1:36532:6432
    secrets:
      - storage_pgbouncer_admin_password
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./boot.sh:/etc/hermes/boot.sh:ro
      - ${HERMES_STORAGE_PGBOUNCER_DATABASES_DIRECTORY:?PgBouncer databases directory is required}:/etc/hermes/runtime:ro
      - ${HERMES_STORAGE_PGBOUNCER_AUTH_DIRECTORY:?PgBouncer auth directory is required}:/etc/hermes/auth
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -V"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

networks:
  platform: {}

secrets:
  storage_postgres_admin_password:
    file: ${HERMES_STORAGE_POSTGRES_SECRET_FILE:?PostgreSQL authenticated secret file is required}
  storage_pgbouncer_admin_password:
    file: ${HERMES_STORAGE_PGBOUNCER_SECRET_FILE:?PgBouncer authenticated secret file is required}
