[databases]
hermes_development = host=postgres port=5432 dbname=hermes_development pool_mode=transaction

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
# Development-only role discovery lets the live conformance suite exercise
# generation-scoped PostgreSQL runtime principals without copying passwords
# into the Compose configuration.
auth_user = hermes_development
auth_query = SELECT usename, '' FROM pg_catalog.pg_user WHERE usename = $1
admin_users = hermes_development,hermes_pgbouncer_admin
pool_mode = transaction
max_client_conn = 32
default_pool_size = 8
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits
