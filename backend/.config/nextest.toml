nextest-version = { required = "0.9.138", recommended = "0.9.138" }

[profile.default]
fail-fast = false
retries = { backoff = "fixed", count = 0, delay = "1s" }
slow-timeout = { period = "45s", terminate-after = 3, grace-period = "10s" }
leak-timeout = { period = "500ms", result = "fail" }
status-level = "slow"
final-status-level = "slow"
failure-output = "immediate-final"
success-output = "never"

[profile.ci]
inherits = "default"
retries = { backoff = "fixed", count = 0, delay = "1s" }
test-threads = 1

[profile.integration]
inherits = "default"
slow-timeout = { period = "120s", terminate-after = 2, grace-period = "15s" }
