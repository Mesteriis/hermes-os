port: 4222
http: 8222

jetstream {
  store_dir: "/data"
  max_mem_store: 64MB
  max_file_store: 128MB
}

authorization {
  users = [
    {
      user: "event_hub"
      password: "event-hub-test-only"
      permissions: {
        publish: { allow: ["$JS.API.>", "$JS.ACK.>", "_INBOX.>"] }
        subscribe: { allow: ["$JS.API.>", "$JS.ACK.>", "_INBOX.>"] }
      }
    },
    {
      user: "notes_runtime"
      password: "notes-runtime-test-only"
      permissions: {
        publish: { allow: ["hermes.event.v1.notes.changed.v1", "$JS.API.STREAM.INFO.>", "$JS.API.CONSUMER.INFO.>", "$JS.API.CONSUMER.MSG.NEXT.>", "$JS.ACK.>"] }
        subscribe: { allow: ["_INBOX.>"] }
      }
    }
  ]
}
