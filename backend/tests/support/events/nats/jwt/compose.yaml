name: hermes-events-jwt-conformance

services:
  fixture:
    image: natsio/nats-box@sha256:ffce8bd103383f179f8c7f11cf645726acf5d17280706c530c3b342dbe16334c
    entrypoint:
      - sh
      - -ec
      - |
        mkdir -p /fixture/nsc
        nsc --all-dirs /fixture/nsc add operator --name hermes-jetstream-test --sys
        nsc --all-dirs /fixture/nsc add account --name events
        nsc --all-dirs /fixture/nsc edit account --name events --sk generate
        nsc --all-dirs /fixture/nsc edit account --name events --js-enable 1
        nsc --all-dirs /fixture/nsc add user --account events --name event_hub \
          --allow-pub '$$JS.API.>,$$JS.ACK.>,_INBOX.>' \
          --allow-sub '$$JS.API.>,$$JS.ACK.>,_INBOX.>'
        nsc --all-dirs /fixture/nsc add user --account SYS --name resolver_update \
          --allow-pub '$$SYS.REQ.>' \
          --allow-sub '_INBOX.>'
        nsc --all-dirs /fixture/nsc keys migrate
        nsc --all-dirs /fixture/nsc describe operator --raw > /fixture/operator.jwt
        nsc --all-dirs /fixture/nsc describe account --name events --raw > /fixture/events.jwt
        nsc --all-dirs /fixture/nsc describe account --name SYS --raw > /fixture/system.jwt
        account_id=$$(nsc --all-dirs /fixture/nsc describe account --name events --json | jq -r '.sub')
        system_account_id=$$(nsc --all-dirs /fixture/nsc describe account --name SYS --json | jq -r '.sub')
        signing_key=$$(nsc --all-dirs /fixture/nsc describe account --name events --json | jq -r '.nats.signing_keys[0]')
        signing_prefix=$$(printf '%s' "$$signing_key" | cut -c2-3)
        cp "/fixture/nsc/keys/A/$$signing_prefix/$$signing_key.nk" /fixture/account-signing.seed
        printf '%s\n' "$$account_id" > /fixture/account-public-key
        chmod 0600 /fixture/account-signing.seed
        chmod 0644 /fixture/account-public-key
        cat > /fixture/server.conf <<EOF
        port: 4222
        http: 8222
        operator: $$(cat /fixture/operator.jwt)
        system_account: $$system_account_id
        resolver: {
          type: full
          dir: "/resolver"
          allow_delete: true
        }
        resolver_preload: {
          $$account_id: $$(cat /fixture/events.jwt)
          $$system_account_id: $$(cat /fixture/system.jwt)
        }
        jetstream {
          store_dir: "/data"
          max_mem_store: 64MB
          max_file_store: 128MB
        }
        EOF
        nsc --all-dirs /fixture/nsc generate creds --account events --name event_hub \
          --output-file /fixture/event-hub.creds
        nsc --all-dirs /fixture/nsc generate creds --account SYS --name resolver_update \
          --output-file /fixture/resolver-update.creds
        chmod 0600 /fixture/event-hub.creds
        chmod 0600 /fixture/resolver-update.creds
    volumes:
      - ${HERMES_NATS_JWT_FIXTURE_DIR:?HERMES_NATS_JWT_FIXTURE_DIR is required}:/fixture

  nats:
    image: nats@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    command: ["-c", "/fixture/server.conf"]
    ports:
      - 127.0.0.1:43223:4222
    volumes:
      - ${HERMES_NATS_JWT_FIXTURE_DIR:?HERMES_NATS_JWT_FIXTURE_DIR is required}:/fixture:ro
      - resolver:/resolver
    depends_on:
      fixture:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 20

  authority:
    image: natsio/nats-box@sha256:ffce8bd103383f179f8c7f11cf645726acf5d17280706c530c3b342dbe16334c
    entrypoint: ["sh", "-ec", "exec sleep infinity"]
    volumes:
      - ${HERMES_NATS_JWT_FIXTURE_DIR:?HERMES_NATS_JWT_FIXTURE_DIR is required}:/fixture
    depends_on:
      fixture:
        condition: service_completed_successfully

volumes:
  resolver:
