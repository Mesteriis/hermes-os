[package]
name = "hermes-events-jetstream-testkit"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "test"
owner = "test"
surface = "test_support"

[dev-dependencies]
async-nats = "=0.49.1"
hermes-events-jetstream = { path = "../../../src/platform/events/jetstream" }
hermes-events-authority = { path = "../../../src/platform/events/authority" }
hermes-events-authority-runtime-control = { path = "../../../src/platform/events/authority/runtime/control" }
hermes-events-protocol = { path = "../../../src/platform/events" }
hermes-runtime-protocol = { path = "../../../src/platform/runtime_protocol" }
hermes-vault-protocol = { path = "../../../src/platform/vault/protocol" }
futures-util = "=0.3.32"
nats-jwt = "=0.3.0"
prost = "=0.14.4"
prost-types = "=0.14.4"
sqlx = { version = "=0.9.0", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls-ring"] }
tokio = { version = "=1.52.4", default-features = false, features = ["macros", "rt-multi-thread", "time"] }
zeroize = "=1.9.0"
