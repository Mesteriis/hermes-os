[package]
name = "hermes-blob-testkit"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
path = "src/lib.rs"

[package.metadata.hermes]
role = "test"
owner = "test"
surface = "test_support"

[dev-dependencies]
hermes-blob-protocol = { path = "../../../src/platform/blob/protocol" }
hermes-blob-runtime = { path = "../../../src/platform/blob/runtime" }
hermes-runtime-protocol = { path = "../../../src/platform/runtime_protocol" }
hermes-vault-protocol = { path = "../../../src/platform/vault/protocol" }
tempfile = "=3.27.0"
tokio = { version = "=1.52.4", default-features = false, features = ["macros", "rt"] }
zeroize = "=1.9.0"
