[package]
name = "hermes-vault-testkit"
version = "0.1.0"
edition = "2024"
license = "MIT"

[package.metadata.hermes]
role = "test"
owner = "test"
surface = "test_support"

[dev-dependencies]
getrandom = { version = "=0.4.3", default-features = false }
hermes-vault-key-provider = { path = "../../../src/platform/vault/key_provider" }
hermes-vault-key-provider-file = { path = "../../../src/platform/vault/key_provider_file" }
hermes-vault-protocol = { path = "../../../src/platform/vault/protocol" }
hermes-vault-store-sqlcipher = { path = "../../../src/platform/vault/store_sqlcipher" }
hermes-runtime-protocol = { path = "../../../src/platform/runtime_protocol" }
hpke = { version = "=0.14.0", default-features = false, features = ["alloc", "chacha", "getrandom", "x25519"] }
libc = "=0.2.186"
prost = "=0.14.4"
p256 = { version = "=0.14.0", default-features = false, features = ["ecdsa"] }
tempfile = "=3.27.0"
zeroize = "=1.9.0"
