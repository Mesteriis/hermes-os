name: hermes-scheduler-delivery-conformance

services:
  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/server.conf"]
    ports:
      - 127.0.0.1:43224:4222
    volumes:
      - ./nats/server.conf:/etc/nats/server.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - 127.0.0.1:35434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 2s
      retries: 20
