port: 4222
http: 8222

jetstream {
  store_dir: "/data"
  max_mem_store: 64MB
  max_file_store: 128MB
}

authorization {
  users = [
    {
      user: "event_hub"
      password: "event-hub-test-only"
      permissions: {
        publish: { allow: ["$JS.API.>", "$JS.ACK.>", "_INBOX.>"] }
        subscribe: { allow: ["$JS.API.>", "$JS.ACK.>", "_INBOX.>"] }
      }
    },
    {
      user: "scheduler_runtime"
      password: "scheduler-runtime-test-only"
      permissions: {
        publish: { allow: ["hermes.command.v1.platform.maintenance.v1", "$JS.API.STREAM.INFO.>", "$JS.API.CONSUMER.INFO.>", "$JS.API.CONSUMER.MSG.NEXT.>", "$JS.ACK.>"] }
        subscribe: { allow: ["_INBOX.>"] }
      }
    }
    {
      user: "mail_runtime"
      password: "mail-runtime-test-only"
      permissions: {
        publish: { allow: ["hermes.ack.v1.mail.job_receipt.v1", "hermes.result.v1.mail.job_receipt.v1"] }
        subscribe: { allow: ["_INBOX.>"] }
      }
    }
  ]
}
