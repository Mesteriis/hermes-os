[package]
name = "hermes-scheduler-testkit"
version = "0.1.0"
edition = "2024"
license = "MIT"

[package.metadata.hermes]
role = "test"
owner = "test"
surface = "test_support"

[dev-dependencies]
async-nats = "=0.49.1"
futures-util = "=0.3.32"
hermes-clock-protocol = { path = "../../../src/platform/clock/protocol" }
hermes-events-jetstream = { path = "../../../src/platform/events/jetstream" }
hermes-events-protocol = { path = "../../../src/platform/events" }
hermes-clock-runtime = { path = "../../../src/platform/clock/runtime" }
hermes-scheduler = { path = "../../../src/platform/scheduler/implementation" }
hermes-scheduler-jetstream = { path = "../../../src/platform/scheduler/jetstream" }
hermes-scheduler-persistence = { path = "../../../src/platform/scheduler/persistence" }
hermes-scheduler-protocol = { path = "../../../src/platform/scheduler/protocol" }
hermes-runtime-protocol = { path = "../../../src/platform/runtime_protocol" }
hermes-storage-migrations = { path = "../../../src/platform/storage/migrations" }
hermes-storage-protocol = { path = "../../../src/platform/storage/protocol" }
sqlx = { version = "=0.9.0", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls-ring"] }
prost = "=0.14.4"
prost-types = "=0.14.4"
nats-jwt = "=0.3.0"
tokio = { version = "=1.52.4", default-features = false, features = ["macros", "rt-multi-thread", "time"] }
