name: Backend clean-room validation

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docs/adr/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs/adr/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/backend.yml'

jobs:
  backend:
    name: ${{ matrix.runner }} / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: make -C backend ci TARGET=${{ matrix.target }}
