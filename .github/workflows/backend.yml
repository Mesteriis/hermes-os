name: Backend clean-room validation

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'docs/adr/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs/adr/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/backend.yml'

jobs:
  backend:
    name: ${{ matrix.runner }} / ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - run: make -C backend ci
      - name: Record validation evidence
        if: always()
        run: |
          mkdir -p backend/target/evidence
          {
            echo "source_sha=${{ github.sha }}"
            echo "runner=${{ matrix.runner }}"
            echo "target=${{ matrix.target }}"
            rustc --version
            cargo --version
            cargo nextest --version
            cargo deny --version
            syft version
          } > backend/target/evidence/validation.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: backend-validation-${{ matrix.runner }}
          path: backend/target/evidence
          if-no-files-found: error
          overwrite: false
          retention-days: 90
