name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Install cargo nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Validate architecture boundaries
        run: make test-architecture

  backend-fmt:
    name: Backend fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal --component rustfmt
          rustup default 1.89

      - name: Validate backend formatting
        run: make backend-fmt-check

  backend-clippy:
    name: Backend clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal --component clippy
          rustup default 1.89

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate backend clippy
        run: make backend-clippy

  backend-unit:
    name: Backend unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install cargo nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run backend unit tests
        run: make test-unit

      - name: Upload backend unit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-reports
          path: |
            reports/test-performance/unit.json
            reports/test-performance/unit.md
            target/nextest/default/junit.xml

  backend-snapshot:
    name: Backend snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install cargo nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run snapshot tests
        run: make test-snapshot

  backend-integration:
    name: Backend integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Check Docker Compose
        run: docker compose version

      - name: Install cargo nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run backend integration tests
        run: make test-integration

      - name: Upload backend integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-reports
          path: |
            reports/test-performance/integration.json
            reports/test-performance/integration.md
            target/nextest/integration/junit.xml

  coverage:
    name: Coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal --component llvm-tools-preview
          rustup default 1.89

      - name: Check Docker Compose
        run: docker compose version

      - name: Install coverage toolchain
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Generate LCOV coverage
        run: make coverage-ci

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            target/coverage/lcov.info
            target/nextest/ci/junit.xml

  security:
    name: Security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal
          rustup default 1.89

      - name: Install security tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run security checks
        run: make security

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend lint
        run: make frontend-lint

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend tests
        run: make frontend-test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend build
        run: make frontend-build

  frontend-visual:
    name: Frontend visual regression
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: cd frontend && pnpm exec playwright install chromium

      - name: Compare Storybook screenshots
        run: make frontend-visual

      - name: Upload visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-regression
          path: |
            frontend/playwright-report
            frontend/test-results/visual
