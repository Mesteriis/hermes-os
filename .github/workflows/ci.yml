name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Validate architecture boundaries
        run: make lint-architecture

  backend-fmt:
    name: Backend fmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88 --profile minimal --component rustfmt
          rustup default 1.88

      - name: Validate backend formatting
        run: make backend-fmt-check

      - name: Clean Rust artifacts
        if: always()
        run: |
          rm -rf /tmp/hermes-cargo-target-*
          cargo clean --manifest-path backend/Cargo.toml || true
          docker system prune -af || true
          df -h

  backend-clippy:
    name: Backend clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88 --profile minimal --component clippy
          rustup default 1.88

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate backend clippy
        run: make backend-clippy

      - name: Clean Rust artifacts
        if: always()
        run: |
          rm -rf /tmp/hermes-cargo-target-*
          cargo clean --manifest-path backend/Cargo.toml || true
          docker system prune -af || true
          df -h

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TARGET_ROOT: /tmp/hermes-cargo-target-${{ github.job }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.88 --profile minimal
          rustup default 1.88

      - name: Check Docker Compose
        run: docker compose version

      - name: Install cargo nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Cargo registry and git sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate backend tests
        run: make backend-test

      - name: Clean Rust and Docker artifacts
        if: always()
        run: |
          rm -rf /tmp/hermes-cargo-target-*
          cargo clean --manifest-path backend/Cargo.toml || true
          docker system prune -af || true
          df -h

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend lint
        run: make frontend-lint

      - name: Clean frontend artifacts
        if: always()
        run: |
          rm -rf frontend/node_modules
          rm -rf frontend/dist frontend/.vite frontend/node_modules/.vite frontend/node_modules/.vite-temp
          df -h

  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend tests
        run: make frontend-test

      - name: Clean frontend artifacts
        if: always()
        run: |
          rm -rf frontend/node_modules
          rm -rf frontend/dist frontend/.vite frontend/node_modules/.vite frontend/node_modules/.vite-temp
          df -h

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          docker system prune -af || true
          df -h

      - name: Disk usage before validation
        run: |
          df -h
          du -h -d 2 . | sort -h | tail -50
          du -sh ~/.cargo ~/.rustup target frontend/node_modules 2>/dev/null || true

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm from frontend package
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "require('./frontend/package.json').packageManager.split('@')[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Validate frontend build
        run: make frontend-build

      - name: Clean frontend artifacts
        if: always()
        run: |
          rm -rf frontend/node_modules
          rm -rf frontend/dist frontend/.vite frontend/node_modules/.vite frontend/node_modules/.vite-temp
          df -h
