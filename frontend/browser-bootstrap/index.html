<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Hub</title>
  <style>
    :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; background: #101827; color: #edf2f7; }
    body { align-items: center; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
    main { box-sizing: border-box; max-width: 36rem; padding: 2rem; width: 100%; }
    h1 { font-size: 1.8rem; margin: 0 0 .5rem; }
    p { color: #b9c5d5; line-height: 1.5; }
    form { display: grid; gap: .75rem; margin-top: 1.5rem; }
    label { font-size: .9rem; font-weight: 650; }
    input, button { border-radius: .5rem; box-sizing: border-box; font: inherit; min-height: 2.8rem; }
    input { background: #172237; border: 1px solid #485a73; color: inherit; padding: .65rem .75rem; width: 100%; }
    button { background: #75d2b2; border: 0; color: #10221d; cursor: pointer; font-weight: 700; padding: .65rem .9rem; }
    button[disabled] { cursor: progress; opacity: .65; }
    #status { border-left: 3px solid #75d2b2; margin-top: 1.5rem; min-height: 1.5rem; padding-left: .75rem; }
    #status[data-kind="error"] { border-color: #ff8f8f; color: #ffd6d6; }
    #status[data-kind="success"] { color: #bdf4df; }
    .quiet { font-size: .85rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <main>
    <h1>Hermes Hub</h1>
    <p id="intro">Подключите этот браузер по одноразовому коду, выданному владельцем Hermes Hub.</p>
    <form id="pairing-form" novalidate>
      <label for="pairing-id">Код подключения</label>
      <input id="pairing-id" autocomplete="off" inputmode="text" maxlength="64" pattern="[A-Fa-f0-9]{64}" required spellcheck="false">
      <button id="pairing-submit" type="submit">Подключить браузер</button>
    </form>
    <form id="authentication-form" hidden>
      <button id="authentication-submit" type="submit">Войти с ключом устройства</button>
    </form>
    <p id="status" aria-live="polite" data-kind="info">Ожидание кода подключения.</p>
    <p class="quiet">Hermes не сохраняет в этом браузере пароль, токен или сессию. Сохраняется только публичный идентификатор WebAuthn-ключа; сессия остаётся в защищённой HttpOnly-cookie.</p>
  </main>
  <script>
    (() => {
      'use strict';

      const credentialStorageKey = 'hermes.browser.credential-id.v1';
      const pairingPattern = /^[a-f\d]{64}$/i;
      const pairingForm = document.querySelector('#pairing-form');
      const pairingInput = document.querySelector('#pairing-id');
      const pairingSubmit = document.querySelector('#pairing-submit');
      const authenticationForm = document.querySelector('#authentication-form');
      const authenticationSubmit = document.querySelector('#authentication-submit');
      const intro = document.querySelector('#intro');
      const status = document.querySelector('#status');

      initialize();
      pairingForm.addEventListener('submit', pairBrowser);
      authenticationForm.addEventListener('submit', authenticateBrowser);

      function initialize() {
        if (!window.isSecureContext || !navigator.credentials || !window.PublicKeyCredential) {
          showError('Для Hermes нужен современный браузер с HTTPS и WebAuthn.');
          pairingSubmit.disabled = true;
          return;
        }
        if (readCredentialId()) showAuthentication();
      }

      async function pairBrowser(event) {
        event.preventDefault();
        const pairingId = pairingInput.value.trim();
        if (!pairingPattern.test(pairingId)) {
          showError('Код подключения должен состоять из 64 шестнадцатеричных символов.');
          return;
        }
        setBusy(pairingSubmit, true);
        showStatus('Запрашиваю подтверждённую владельцем регистрацию…');
        try {
          const response = await sameOriginFetch(`/browser/v1/pairing/${pairingId}/registration`, { method: 'GET' });
          if (!response.ok) throw new Error('Код подключения недействителен или истёк.');
          const ceremony = await response.json();
          const publicKey = registrationOptions(ceremony);
          const credential = await navigator.credentials.create({ publicKey });
          if (!isPublicKeyCredential(credential)) throw new Error('WebAuthn-ключ устройства недоступен.');
          const finish = await sameOriginFetch(`/browser/v1/pairing/${pairingId}/registration/finish`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(registrationPayload(credential)),
          });
          if (!finish.ok) throw new Error('Подключение браузера отклонено. Повторите с новым кодом владельца.');
          localStorage.setItem(credentialStorageKey, base64UrlEncode(new Uint8Array(credential.rawId)));
          pairingInput.value = '';
          showAuthentication();
          showSuccess('Браузер подключён. Подтвердите ключ устройства, чтобы войти.');
        } catch (error) {
          showError(message(error));
        } finally {
          setBusy(pairingSubmit, false);
        }
      }

      async function authenticateBrowser(event) {
        event.preventDefault();
        const credentialId = readCredentialId();
        if (!credentialId) {
          showPairing();
          showError('Для входа сначала подключите этот браузер.');
          return;
        }
        setBusy(authenticationSubmit, true);
        showStatus('Подтвердите ключ устройства…');
        try {
          const begin = await sameOriginFetch('/browser/v1/authentication/begin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential_id: credentialId }),
          });
          if (!begin.ok) throw new Error('Этот ключ больше не разрешён для Hermes.');
          const ceremony = await begin.json();
          const credential = await navigator.credentials.get({ publicKey: authenticationOptions(ceremony) });
          if (!isPublicKeyCredential(credential)) throw new Error('WebAuthn-подтверждение не выполнено.');
          const finish = await sameOriginFetch(`/browser/v1/authentication/${authenticationId(ceremony)}/finish`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(assertionPayload(credential)),
          });
          if (!finish.ok) throw new Error('Вход был отклонён.');
          await confirmSession();
          showSuccess('Вход выполнен. Сессия browser-клиента подтверждена.');
        } catch (error) {
          showError(message(error));
        } finally {
          setBusy(authenticationSubmit, false);
        }
      }

      function registrationOptions(value) {
        if (!record(value) || !record(value.public_key)) throw new Error('Сервер вернул некорректную регистрацию.');
        const options = value.public_key;
        if (!record(options.rp) || !record(options.user) || !Array.isArray(options.pubKeyCredParams)) {
          throw new Error('Сервер вернул некорректную регистрацию.');
        }
        return {
          ...options,
          challenge: base64UrlDecode(options.challenge),
          user: { ...options.user, id: base64UrlDecode(options.user.id) },
          excludeCredentials: credentialDescriptors(options.excludeCredentials),
        };
      }

      function authenticationOptions(value) {
        if (!record(value) || !record(value.public_key)) throw new Error('Сервер вернул некорректный вход.');
        const options = value.public_key;
        return {
          ...options,
          challenge: base64UrlDecode(options.challenge),
          allowCredentials: credentialDescriptors(options.allowCredentials),
        };
      }

      function credentialDescriptors(value) {
        if (value === undefined) return undefined;
        if (!Array.isArray(value)) throw new Error('Сервер вернул некорректный WebAuthn-ключ.');
        return value.map((descriptor) => {
          if (!record(descriptor)) throw new Error('Сервер вернул некорректный WebAuthn-ключ.');
          return { ...descriptor, id: base64UrlDecode(descriptor.id) };
        });
      }

      function registrationPayload(credential) {
        const response = credential.response;
        if (!response || !(response.attestationObject instanceof ArrayBuffer) || !(response.clientDataJSON instanceof ArrayBuffer)) {
          throw new Error('WebAuthn-ключ вернул некорректную регистрацию.');
        }
        return {
          id: credential.id,
          rawId: base64UrlEncode(new Uint8Array(credential.rawId)),
          type: credential.type,
          response: {
            attestationObject: base64UrlEncode(new Uint8Array(response.attestationObject)),
            clientDataJSON: base64UrlEncode(new Uint8Array(response.clientDataJSON)),
            transports: typeof response.getTransports === 'function' ? response.getTransports() : [],
          },
          clientExtensionResults: credential.getClientExtensionResults(),
        };
      }

      function assertionPayload(credential) {
        const response = credential.response;
        if (!response || !(response.authenticatorData instanceof ArrayBuffer) || !(response.clientDataJSON instanceof ArrayBuffer) || !(response.signature instanceof ArrayBuffer)) {
          throw new Error('WebAuthn-ключ вернул некорректное подтверждение.');
        }
        return {
          id: credential.id,
          rawId: base64UrlEncode(new Uint8Array(credential.rawId)),
          type: credential.type,
          response: {
            authenticatorData: base64UrlEncode(new Uint8Array(response.authenticatorData)),
            clientDataJSON: base64UrlEncode(new Uint8Array(response.clientDataJSON)),
            signature: base64UrlEncode(new Uint8Array(response.signature)),
            userHandle: response.userHandle ? base64UrlEncode(new Uint8Array(response.userHandle)) : null,
          },
          clientExtensionResults: credential.getClientExtensionResults(),
        };
      }

      function authenticationId(value) {
        if (!record(value) || typeof value.authentication_id !== 'string' || !pairingPattern.test(value.authentication_id)) {
          throw new Error('Сервер вернул некорректный вход.');
        }
        return value.authentication_id;
      }

      function readCredentialId() {
        const value = localStorage.getItem(credentialStorageKey);
        return typeof value === 'string' && /^[A-Za-z0-9_-]{1,1024}$/.test(value) ? value : null;
      }

      function sameOriginFetch(path, init) {
        const url = new URL(path, window.location.origin);
        if (url.origin !== window.location.origin || url.pathname.charAt(0) !== '/') {
          throw new Error('Запрос Hermes должен оставаться в этом origin.');
        }
        return fetch(`${url.pathname}${url.search}`, { ...init, cache: 'no-store', credentials: 'same-origin', mode: 'same-origin', redirect: 'error' });
      }

      async function confirmSession() {
        const response = await sameOriginFetch('/hermes.gateway.v1.BrowserSessionService/GetStatus', {
          method: 'POST',
          headers: { 'Content-Type': 'application/proto', 'Connect-Protocol-Version': '1' },
          body: new Uint8Array(),
        });
        if (!response.ok) throw new Error('Сессия browser-клиента недоступна.');
      }

      function isPublicKeyCredential(value) {
        return value instanceof PublicKeyCredential && value.rawId instanceof ArrayBuffer;
      }

      function record(value) { return typeof value === 'object' && value !== null; }
      function base64UrlEncode(bytes) {
        let binary = '';
        for (const byte of bytes) binary += String.fromCharCode(byte);
        return btoa(binary).replaceAll('+', '-').replaceAll('/', '_').replace(/=+$/, '');
      }
      function base64UrlDecode(value) {
        if (typeof value !== 'string' || !/^[A-Za-z0-9_-]+$/.test(value)) throw new Error('Сервер вернул некорректные WebAuthn-данные.');
        const binary = atob(value.replaceAll('-', '+').replaceAll('_', '/').padEnd(Math.ceil(value.length / 4) * 4, '='));
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
        return bytes.buffer;
      }
      function setBusy(button, busy) { button.disabled = busy; }
      function showAuthentication() { pairingForm.hidden = true; authenticationForm.hidden = false; intro.textContent = 'Этот браузер уже подключён. Для входа подтвердите ключ устройства.'; }
      function showPairing() { pairingForm.hidden = false; authenticationForm.hidden = true; intro.textContent = 'Подключите этот браузер по одноразовому коду, выданному владельцем Hermes Hub.'; }
      function showStatus(text) { status.dataset.kind = 'info'; status.textContent = text; }
      function showSuccess(text) { status.dataset.kind = 'success'; status.textContent = text; }
      function showError(text) { status.dataset.kind = 'error'; status.textContent = text; }
      function message(error) { return error instanceof Error ? error.message : 'Операция Hermes не выполнена.'; }
    })();
  </script>
</body>
</html>
