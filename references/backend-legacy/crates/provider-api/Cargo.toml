[package]
name = "hermes-provider-api"
version = "0.1.0"
edition = "2024"
rust-version = "1.89"
publish = false
license = "MIT"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
hermes-kernel = { path = "../kernel" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
zeroize = { version = "1", features = ["derive"] }

[dev-dependencies]
hermes-blob-api = { path = "../blob-api" }
