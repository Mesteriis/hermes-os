---
x-hermes-labels: &hermes-labels
  com.hermes.testkit: "true"
  com.hermes.testkit.session: "${HERMES_TEST_SESSION_ID:-manual}"

services:
  database:
    image: "zulip/zulip-postgresql:14"
    restart: "no"
    secrets:
      - zulip__postgres_password
    environment:
      POSTGRES_DB: "zulip"
      POSTGRES_USER: "zulip"
      POSTGRES_PASSWORD_FILE: /run/secrets/zulip__postgres_password
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip-database"

  memcached:
    image: "memcached:alpine"
    restart: "no"
    command:
      - "sh"
      - "-euc"
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$(cat $$MEMCACHED_PASSWORD_FILE)" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$(cat $$MEMCACHED_PASSWORD_FILE)" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    secrets:
      - zulip__memcached_password
    environment:
      SASL_CONF_PATH: "/home/memcache/memcached.conf"
      MEMCACHED_SASL_PWDB: "/home/memcache/memcached-sasl-db"
      MEMCACHED_PASSWORD_FILE: /run/secrets/zulip__memcached_password
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip-memcached"

  rabbitmq:
    image: "rabbitmq:4.2"
    restart: "no"
    command:
      - "sh"
      - "-euc"
      - |
        export RABBITMQ_DEFAULT_PASS="$$(cat $$RABBITMQ_PASSWORD_FILE)"
        echo "default_user = $$RABBITMQ_DEFAULT_USER" >> /etc/rabbitmq/rabbitmq.conf
        echo "default_pass = $$RABBITMQ_DEFAULT_PASS" >> /etc/rabbitmq/rabbitmq.conf
        exec docker-entrypoint.sh rabbitmq-server
    secrets:
      - zulip__rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_USER: "zulip"
      RABBITMQ_PASSWORD_FILE: /run/secrets/zulip__rabbitmq_password
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip-rabbitmq"

  redis:
    image: "redis:alpine"
    restart: "no"
    command:
      - "sh"
      - "-euc"
      - '/usr/local/bin/docker-entrypoint.sh --requirepass "$$(cat $$REDIS_PASSWORD_FILE)"'
    secrets:
      - zulip__redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/zulip__redis_password
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip-redis"

  zulip:
    image: "ghcr.io/zulip/zulip-server:12.1-0"
    restart: "no"
    secrets:
      - zulip__postgres_password
      - zulip__memcached_password
      - zulip__rabbitmq_password
      - zulip__redis_password
      - zulip__secret_key
      - zulip__email_password
    environment:
      SETTING_REMOTE_POSTGRES_HOST: "database"
      SETTING_MEMCACHED_LOCATION: "memcached:11211"
      SETTING_RABBITMQ_HOST: "rabbitmq"
      SETTING_REDIS_HOST: "redis"
      SETTING_EXTERNAL_HOST: "localhost.localdomain"
      SETTING_ZULIP_ADMINISTRATOR: "hermes-admin@example.com"
      SETTING_NOREPLY_EMAIL_ADDRESS: "noreply@example.com"
      LOADBALANCER_IPS: "0.0.0.0/0"
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip"
    depends_on:
      - database
      - memcached
      - rabbitmq
      - redis
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576

  proxy:
    image: "nginx:alpine"
    restart: "no"
    ports:
      - "127.0.0.1::8080"
    volumes:
      - "./nginx.testcontainers.conf:/etc/nginx/conf.d/default.conf:ro"
    labels:
      <<: *hermes-labels
      com.hermes.testkit.service: "zulip-proxy"
    depends_on:
      - zulip

secrets:
  zulip__postgres_password:
    environment: "ZULIP__POSTGRES_PASSWORD"
  zulip__memcached_password:
    environment: "ZULIP__MEMCACHED_PASSWORD"
  zulip__rabbitmq_password:
    environment: "ZULIP__RABBITMQ_PASSWORD"
  zulip__redis_password:
    environment: "ZULIP__REDIS_PASSWORD"
  zulip__secret_key:
    environment: "ZULIP__SECRET_KEY"
  zulip__email_password:
    environment: "ZULIP__EMAIL_PASSWORD"
