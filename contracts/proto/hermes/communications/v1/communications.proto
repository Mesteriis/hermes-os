  string reason = 3;
  string resolution = 4;
}

message ListCommunicationBlockersRequest {}

message ListCommunicationBlockersResponse {
  repeated CommunicationArchitectureBlocker items = 1;
}

message CommunicationPersona {
  string persona_id = 1;
  string account_id = 2;
