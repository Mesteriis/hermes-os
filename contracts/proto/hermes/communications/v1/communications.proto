message ListDraftsResponse {
  repeated CommunicationDraft items = 1;
  hermes.common.v1.PageResponse page = 2;
}

message CreateDraftRequest {
  string draft_id = 1;
  string account_id = 2;
  optional string persona_id = 3;
  repeated string to_recipients = 4;
  repeated string cc_recipients = 5;
  repeated string bcc_recipients = 6;
  string subject = 7;
  string body_text = 8;
  optional string body_html = 9;
  optional string in_reply_to = 10;
  repeated string references = 11;
  optional string status = 12;
  optional string scheduled_send_at = 13;
  string metadata_json = 14;
  repeated string attachment_ids = 15;
  bool replace_attachments = 16;
}

message CreateDraftResponse {
  CommunicationDraft item = 1;
}

message DeleteDraftRequest {
  string draft_id = 1;
}

message DeleteDraftResponse {
  bool deleted = 1;
}

message CommunicationOutboxItem {
  string outbox_id = 1;
  string account_id = 2;
  optional string draft_id = 3;
  repeated string to_recipients = 4;
  repeated string cc_recipients = 5;
  repeated string bcc_recipients = 6;
  string subject = 7;
  string body_text = 8;
  optional string body_html = 9;
  string status = 10;
  optional string scheduled_send_at = 11;
  optional string undo_deadline_at = 12;
  int32 send_attempts = 13;
  optional string claimed_at = 14;
  optional string sent_at = 15;
  optional string provider_message_id = 16;
  optional string last_error = 17;
  string metadata_json = 18;
  string created_at = 19;
  string updated_at = 20;
}

message ListOutboxRequest {
  optional string account_id = 1;
  optional string status = 2;
  hermes.common.v1.PageRequest page = 3;
}

message ListOutboxResponse {
  repeated CommunicationOutboxItem items = 1;
  hermes.common.v1.PageResponse page = 2;
}

message UndoOutboxItemRequest {
  string outbox_id = 1;
}

message UndoOutboxItemResponse {
  CommunicationOutboxItem item = 1;
}

message SendMessageRequest {
  string account_id = 1;
  repeated string to_recipients = 2;
  repeated string cc_recipients = 3;
  repeated string bcc_recipients = 4;
  string subject = 5;
  string body_text = 6;
  optional string body_html = 7;
  optional string scheduled_send_at = 8;
  string metadata_json = 9;
  optional string in_reply_to = 10;
  repeated string references = 11;
  optional string draft_id = 12;
  optional int64 undo_send_seconds = 13;
  bool confirmed_provider_write = 14;
}

message SendMessageResponse {
  CommunicationOutboxItem item = 1;
  string message_id = 2;
  optional string outbox_id = 3;
  repeated string accepted = 4;
  repeated string accepted_recipients = 5;
  string transport = 6;
  string status = 7;
  optional string scheduled_send_at = 8;
  optional string undo_deadline_at = 9;
  optional string failure_reason = 10;
}

