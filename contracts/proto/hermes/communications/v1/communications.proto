}

message RichTemplateMailMergePreviewResponse {
  string template_id = 1;
  uint32 row_count = 2;
  uint32 ready_count = 3;
  uint32 blocked_count = 4;
  repeated RichTemplateMailMergePreviewItem items = 5;
}

