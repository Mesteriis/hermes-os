notes:
  - Every Cargo package source root now contains only lib.rs and/or main.rs; Clock, Telemetry and test-support source files are grouped by named responsibility directories.
  - Development operator compilation retains pre-existing dead-code warnings from path-included production helper modules; no warning is introduced by this layout slice.
  - Telemetry Collector control is split into handshake, diagnostics, and framing; the recovery fixture now uses an atomic suffix to avoid concurrent SQLite path collisions.
  - Aggregate telemetry diagnostics are proven from Collector segment store through Kernel managed-child relay; missing owner sessions are rejected by owner-control IPC before relay.
  - telemetry_v1 is open only for the private Collector capability; client-facing export remains deferred to client_gateway_v1.
