name: hermes-hub-dev

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${HERMES_POSTGRES_DB:?Set HERMES_POSTGRES_DB in docker/.env}
      POSTGRES_USER: ${HERMES_POSTGRES_USER:?Set HERMES_POSTGRES_USER in docker/.env}
      POSTGRES_PASSWORD: ${HERMES_POSTGRES_PASSWORD:?Set HERMES_POSTGRES_PASSWORD in docker/.env}
    ports:
      - "${HERMES_POSTGRES_BIND:-127.0.0.1}:${HERMES_POSTGRES_PORT:-5432}:5432"
    volumes:
      - type: bind
        source: ./data/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /workspace
    command: ["sleep", "infinity"]
    environment:
      DATABASE_URL: postgres://${HERMES_POSTGRES_USER}:${HERMES_POSTGRES_PASSWORD}@postgres:5432/${HERMES_POSTGRES_DB}
      HERMES_HTTP_ADDR: 0.0.0.0:${HERMES_BACKEND_PORT:-8080}
      HERMES_LOCAL_API_TOKEN: ${HERMES_LOCAL_API_TOKEN:?Set HERMES_LOCAL_API_TOKEN in docker/.env}
      HERMES_SECRET_VAULT_KEY: ${HERMES_SECRET_VAULT_KEY:?Set HERMES_SECRET_VAULT_KEY in docker/.env}
      HERMES_OLLAMA_BASE_URL: ${HERMES_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      HERMES_OLLAMA_CHAT_MODEL: ${HERMES_OLLAMA_CHAT_MODEL:-qwen3:4b}
      HERMES_OLLAMA_EMBED_MODEL: ${HERMES_OLLAMA_EMBED_MODEL:-qwen3-embedding:4b}
      HERMES_OLLAMA_TIMEOUT_SECONDS: ${HERMES_OLLAMA_TIMEOUT_SECONDS:-120}
      RUST_LOG: debug
    ports:
      - "${HERMES_BACKEND_BIND:-127.0.0.1}:${HERMES_BACKEND_PORT:-8080}:${HERMES_BACKEND_PORT:-8080}"
    volumes:
      - type: bind
        source: ..
        target: /workspace
      - type: bind
        source: ./data/cargo-registry
        target: /usr/local/cargo/registry
      - type: bind
        source: ./data/cargo-git
        target: /usr/local/cargo/git
    depends_on:
      postgres:
        condition: service_healthy
